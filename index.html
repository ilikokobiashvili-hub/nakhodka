<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>НАХОДКА — Учёт</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;
  --accent:#f97316;--accent-dim:rgba(249,115,22,0.12);
  --text:#f0f0f0;--muted:#777;--border:#2a2a2a;
  --success:#22c55e;--danger:#ef4444;--warning:#eab308;--info:#3b82f6;
  --sidebar-w:220px
}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;font-size:14px}
#sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:10}
.sb-logo{padding:20px 16px;border-bottom:1px solid var(--border)}
.sb-logo h1{font-size:20px;font-weight:700;color:var(--accent);letter-spacing:3px}
.sb-logo p{font-size:11px;color:var(--muted);margin-top:3px}
.nav-sec{padding:6px 0;border-bottom:1px solid var(--border)}
.nav-lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--muted);padding:8px 16px 4px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;color:var(--muted);font-size:13px;font-weight:500;transition:all .15s;border-left:3px solid transparent}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:var(--accent-dim)}
.nav-icon{font-size:15px;width:20px;text-align:center}
.sb-foot{padding:14px 16px;margin-top:auto;border-top:1px solid var(--border)}
.sb-foot p{font-size:11px;color:var(--muted);text-align:center;line-height:1.6}

#content{margin-left:var(--sidebar-w);flex:1;padding:28px;max-width:calc(100vw - var(--sidebar-w));min-height:100vh}
.page-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
.page-title{font-size:22px;font-weight:700}
.page-sub{font-size:12px;color:var(--muted);margin-top:3px}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:24px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.kpi-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.kpi-val{font-family:'JetBrains Mono',monospace;font-size:19px;font-weight:500}
.kpi-val.accent{color:var(--accent)}
.kpi-val.ok{color:var(--success)}
.kpi-val.bad{color:var(--danger)}

.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px}
.card-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.card-hdr h3{font-size:14px;font-weight:600}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl-wrap::-webkit-scrollbar{height:4px}
.tbl-wrap::-webkit-scrollbar-track{background:var(--surface2)}
.tbl-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
table{width:100%;border-collapse:collapse}
th{background:var(--surface2);padding:9px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;vertical-align:middle;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
th.sticky-r,td.sticky-r{position:sticky;right:0;background:var(--surface);z-index:2;box-shadow:-3px 0 8px rgba(0,0,0,.3)}
tr:hover td.sticky-r{background:var(--surface2)}
.r{text-align:right;font-family:'JetBrains Mono',monospace;font-weight:500}
.ok{color:var(--success)}.bad{color:var(--danger)}.dim{color:var(--muted)}
.empty{padding:48px;text-align:center;color:var(--muted)}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:8px;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{opacity:.88}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--border)}.btn-g:hover{background:var(--surface2);color:var(--text)}
.btn-d{background:transparent;color:var(--danger);border:1px solid var(--danger);padding:4px 9px;font-size:11px;border-radius:6px;cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:600}.btn-d:hover{background:rgba(239,68,68,.1)}
.btn-e{background:transparent;color:var(--info);border:1px solid var(--info);padding:4px 9px;font-size:11px;border-radius:6px;cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:600}.btn-e:hover{background:rgba(59,130,246,.12)}
.btn-sm{padding:6px 12px;font-size:12px}
.row-acts{display:flex;gap:5px;align-items:center}

#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;justify-content:center;align-items:flex-start;padding:40px 20px;overflow-y:auto}
#ov.on{display:flex}
#mbox{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:520px;padding:24px}
.m-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.m-hdr h2{font-size:16px;font-weight:700}
.m-x{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:2px 8px;line-height:1}
.m-x:hover{color:var(--text)}
.m-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg.c1{grid-template-columns:1fr}
.fg.c3{grid-template-columns:1fr 1fr 1fr}
.fgrp{display:flex;flex-direction:column;gap:6px}
.fgrp.full{grid-column:1/-1}
label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
input,select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:9px 12px;font-family:'Montserrat',sans-serif;font-size:13px;outline:none;transition:border-color .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
select option{background:var(--surface2)}
textarea{resize:vertical;min-height:60px}

.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.b-ok{background:rgba(34,197,94,.15);color:var(--success)}
.b-bad{background:rgba(239,68,68,.15);color:var(--danger)}
.b-warn{background:rgba(234,179,8,.15);color:var(--warning)}
.b-info{background:rgba(59,130,246,.15);color:var(--info)}
.b-dim{background:rgba(120,120,120,.15);color:var(--muted)}

.pnl-blk{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px}
.pnl-r{display:flex;justify-content:space-between;align-items:center;padding:10px 18px;border-bottom:1px solid rgba(255,255,255,.04)}
.pnl-r:last-child{border-bottom:none}
.pnl-r.hd{background:var(--surface2);font-weight:700;font-size:12px;color:var(--accent);text-transform:uppercase;letter-spacing:.8px}
.pnl-r.tot{background:var(--surface2);font-weight:700;font-size:15px}
.pnl-r.sub{padding-left:32px;color:var(--muted);font-size:12px}
.pnl-n{font-family:'JetBrains Mono',monospace;font-weight:500}

.fbar{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.fbar label{font-size:12px;color:var(--muted)}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* View mode — hide all edit controls */
body.is-view-mode .btn-e,
body.is-view-mode .btn-d,
body.is-view-mode .btn-p,
body.is-view-mode .row-acts,
body.is-view-mode [onclick*="oAdd"],
body.is-view-mode [onclick*="oEdit"],
body.is-view-mode [onclick*="svBatch"],
body.is-view-mode #gist-pub-btn{display:none!important}

/* ═══ MOBILE ═══ */
#mob-nav{display:none}
@media(max-width:768px){
  body{display:block}
  #sidebar{display:none}
  #content{
    margin-left:0!important;
    padding:14px 12px 90px!important;
    max-width:100vw!important;
    width:100%!important;
    box-sizing:border-box
  }
  #mob-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;z-index:200;
    background:var(--surface);border-top:1px solid var(--border);
    padding:6px 0 env(safe-area-inset-bottom,6px);
  }
  .mob-tab{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
    padding:6px 4px;cursor:pointer;border:none;background:none;
    font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;
    letter-spacing:.4px;font-family:'Montserrat',sans-serif;transition:color .15s;
  }
  .mob-tab .mi{font-size:20px;line-height:1}
  .mob-tab.active{color:var(--accent)}

  .page-hdr{flex-direction:column;gap:10px;align-items:flex-start}
  .page-title{font-size:20px}

  /* KPI grid - 2 columns on mobile */
  .kpi-grid{grid-template-columns:1fr 1fr!important;gap:8px}
  .kpi{padding:12px 14px}
  .kpi-val{font-size:16px}
  .kpi-lbl{font-size:9px}

  /* Tables - full width scrollable */
  .tbl-wrap,.card{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;box-sizing:border-box}
  table{min-width:480px;font-size:12px}

  /* Cards full width */
  .card{border-radius:10px}
  .card-hdr{padding:12px 14px}
  .card-hdr h3{font-size:13px}

  /* Forms single column */
  .fg{grid-template-columns:1fr!important}
  .fgrp.full{grid-column:1!important}
  .m-box{width:96vw!important;max-height:88vh!important;margin:auto}

  /* P&L rows */
  .pnl-r{padding:10px 12px!important;font-size:12px!important}
  .pnl-n{font-size:13px!important}

  /* View mode banner */
  #view-banner{padding:8px 12px!important;flex-direction:column;gap:4px;align-items:flex-start}
  #view-banner .vb-detail{display:none}

  /* Hide edit/delete buttons in view mode */
  .view-mode-hide{display:none!important}

  /* Tier cards grid */
  .tier-grid{grid-template-columns:repeat(2,1fr)!important}

  /* Planning blocks */
  [style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr!important}
  [style*="grid-template-columns:repeat(auto-fill"]{grid-template-columns:1fr 1fr!important}
}
</style>
</head>

  <div class="sb-logo">

<script>
// ═══ STORAGE ═══
const K={settings:'nk_settings',sales:'nk_sales',expenses:'nk_expenses',batches:'nk_batches',plans:'nk_plans',inventory:'nk_inventory',avito:'nk_avito'};
const DEF={taxRate:.08,cashBalance:0,beznalBalance:0,storeName:'НАХОДКА',startDate:'2026-03-23',acquiringRate:0.0195};
const CATS=['Товар/Палеты','Доставка','Аренда','Зарплата','Маркетинг','Прочее','Ремонт','Оборудование'];
const GOCAT=['Одежда женская','Одежда мужская','Одежда детская','Обувь','Аксессуары','Текстиль','Посуда','Игрушки','Электроника','Книги','Прочее'];
const DEF_PRICE_CATS=[
  {key:'s',    label:'S',    price:149},
  {key:'m',    label:'M',    price:299},
  {key:'l',    label:'L',    price:499},
  {key:'xl1',  label:'1XL',  price:999},
  {key:'xl15', label:'1.5XL',price:1499},
  {key:'xl2',  label:'2XL',  price:1999},
  {key:'xl3',  label:'3XL',  price:2999},
  {key:'xl5',  label:'5XL',  price:4999},
];
const TIER_COLORS=['#6366f1','#22c55e','#f97316','#eab308','#ef4444','#ec4899','#14b8a6','#a855f7','#fb923c','#84cc16'];
function priceCats(){const s=load(K.settings);return(s&&s.priceCats&&s.priceCats.length)?s.priceCats:DEF_PRICE_CATS;}

function load(k){try{const r=localStorage.getItem(k);return r?JSON.parse(r):null}catch{return null}}
function save(k,d){try{localStorage.setItem(k,JSON.stringify(d))}catch{}}
function cfg(){return load(K.settings)||{...DEF}}
function sales(){return load(K.sales)||[]}
function avitoSales(){return load(K.avito)||[]}
function exps(){return load(K.expenses)||[]}
function batches(){return load(K.batches)||[]}
function plans(){return load(K.plans)||[]}
function inventory(){return load(K.inventory)||[]}
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}

// ─── PRICE CAT HELPERS ───
// Returns {qty, rev} summed from priceCats, or null if no data
function tierSums(x){
  if(!x.priceCats)return null;
  let qty=0,rev=0;
  Object.values(x.priceCats).forEach(v=>{qty+=v.qty||0;rev+=v.rev||0});
  return qty>0?{qty,rev}:null;
}
// Best avg price per item: prefers tier data, falls back to total/checks
function avgPerItem(x){
  const ts=tierSums(x);
  if(ts&&ts.qty>0)return ts.rev/ts.qty;
  const t=(x.nal||0)+(x.beznal||0);
  const chk=(x.nalChecks||0)+(x.beznalChecks||0);
  return chk>0?t/chk:0;
}

// ═══ FORMAT ═══
function fr(n){if(n===null||n===undefined||isNaN(n))return'—';return Math.round(n).toLocaleString('ru-RU')+' ₽'}
function fn(n){return n?Math.round(n).toLocaleString('ru-RU'):'0'}
function fp(n){return(n&&!isNaN(n))?(n*100).toFixed(1)+'%':'—'}
function fd(s){if(!s)return'—';const d=new Date(s+'T00:00:00');return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'})}
function today(){return new Date().toISOString().slice(0,10)}
function mk(d){return d.slice(0,7)}
function ml(ym){const[y,m]=ym.split('-');const mn=['','Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];return mn[+m]+' '+y}

// ═══ CALCS ═══
function calcPeriod(f,t){
  const s=cfg();
  const ms=sales().filter(x=>x.date>=f&&x.date<=t);
  const av=avitoSales().filter(x=>x.date>=f&&x.date<=t);
  const me=exps().filter(x=>x.date>=f&&x.date<=t);
  const mb=batches().filter(x=>x.date>=f&&x.date<=t);
  const revShop=ms.reduce((a,x)=>a+(x.nal||0)+(x.beznal||0),0);
  const revAvito=av.reduce((a,x)=>a+(x.total||0),0);
  const rev=revShop+revAvito;
  const opexp=me.filter(x=>x.category!=='Товар/Палеты'&&x.category!=='Доставка').reduce((a,x)=>a+(x.nal||0)+(x.beznal||0),0);
  const cogs=mb.reduce((a,x)=>a+(x.cost||0)+(x.delivery||0),0);
  const exp=opexp+cogs;
  const chk=ms.reduce((a,x)=>a+(x.nalChecks||0)+(x.beznalChecks||0),0)+av.length;
  const tierQty=ms.reduce((a,x)=>{const ts=tierSums(x);return a+(ts?ts.qty:0)},0);
  const tierRev=ms.reduce((a,x)=>{const ts=tierSums(x);return a+(ts?ts.rev:0)},0);
  const avitoQty=av.reduce((a,x)=>a+(x.qty||1),0);
  const items=tierQty>0?tierQty+avitoQty:chk;
  const avg=items>0?(tierQty>0?(tierRev+revAvito):rev)/items:0;
  const tax=rev*s.taxRate;
  const cats=priceCats();
  const tierTotals={};cats.forEach(c=>{tierTotals[c.key]={qty:0,rev:0}});
  ms.forEach(x=>{if(x.priceCats)cats.forEach(c=>{if(x.priceCats[c.key]){tierTotals[c.key].qty+=x.priceCats[c.key].qty||0;tierTotals[c.key].rev+=x.priceCats[c.key].rev||0}})});
  return{rev,exp,opexp,cogs,chk,items,tax,profit:rev-exp-tax,avg,tierTotals,revAvito,avitoQty};
}

function calcMonth(){
  const now=new Date(),ym=now.toISOString().slice(0,7),s=cfg();
  const f=new Date(now.getFullYear(),now.getMonth(),1).toISOString().slice(0,10);
  const t=today();
  return calcPeriod(f,t);
}

// ── Backward-compat: get payments array for a batch ──
// New batches have x.payments[]. Old batches have x.fundSource + x.payType.
function getBatchPayments(x){
  if(x.payments&&x.payments.length>0)return x.payments;
  const t=(x.cost||0)+(x.delivery||0);
  if(!t)return[];
  return[{id:'legacy',source:x.fundSource||'business',type:x.payType||'нал',amount:t,date:x.date}];
}

function calcBal(){
  const s=cfg();
  const acqRate=s.acquiringRate!=null?s.acquiringRate:0.0195;
  let c=s.cashBalance||0,b=s.beznalBalance||0;
  (s.founderInjections||[]).forEach(x=>{if(x.type==='nal')c+=x.amount||0;else b+=x.amount||0;});
  sales().forEach(x=>{c+=x.nal||0;b+=(x.beznal||0)*(1-acqRate);});
  // Avito deals: nal goes to cash, beznal to bank minus acquiring
  avitoSales().forEach(x=>{
    if(x.payType==='nal')c+=x.total||0;
    else b+=(x.total||0)*(1-acqRate);
  });
  exps().filter(x=>x.category!=='Товар/Палеты'&&x.category!=='Доставка'&&x.fundSource!=='founder')
    .forEach(x=>{c-=x.nal||0;b-=x.beznal||0});
  batches().forEach(x=>{
    getBatchPayments(x).forEach(p=>{
      if(p.source==='founder')return;
      if(p.type==='безнал')b-=p.amount||0; else c-=p.amount||0;
    });
  });
  return{c,b};
}

function calcPnL(f,t){
  const s=cfg();
  const acqRate=s.acquiringRate!=null?s.acquiringRate:0.0195;
  const ms=sales().filter(x=>x.date>=f&&x.date<=t);
  const me=exps().filter(x=>x.date>=f&&x.date<=t);
  const mb=batches().filter(x=>x.date>=f&&x.date<=t);
  const av=avitoSales().filter(x=>x.date>=f&&x.date<=t);
  const rn=ms.reduce((a,x)=>a+(x.nal||0),0)+av.filter(x=>x.payType==='nal').reduce((a,x)=>a+(x.total||0),0);
  const rb=ms.reduce((a,x)=>a+(x.beznal||0),0)+av.filter(x=>x.payType==='beznal').reduce((a,x)=>a+(x.total||0),0);
  const rev=rn+rb;
  const acqFee=rb*acqRate;
  const cb=mb.reduce((a,x)=>a+(x.cost||0),0);
  const cd=mb.reduce((a,x)=>a+(x.delivery||0),0);
  const cogs=cb+cd;
  const gp=rev-cogs-acqFee;
  const bycat={};
  CATS.forEach(c=>{bycat[c]=0});
  me.forEach(e=>{const c=e.category||'Прочее';bycat[c]=(bycat[c]||0)+(e.nal||0)+(e.beznal||0)});
  const opexp=Object.entries(bycat).filter(([k])=>k!=='Товар/Палеты'&&k!=='Доставка').reduce((a,[,v])=>a+v,0);
  const ebitda=gp-opexp;
  const tax=rev*s.taxRate;
  const net=ebitda-tax;
  return{rn,rb,rev,acqFee,acqRate,cb,cd,cogs,gp,gm:rev>0?gp/rev:0,bycat,opexp,ebitda,em:rev>0?ebitda/rev:0,tax,net,nm:rev>0?net/rev:0};
}

function calcDyn(){
  const s=cfg();
  const allDates=new Set([...sales().map(x=>mk(x.date)),...avitoSales().map(x=>mk(x.date)),...exps().map(x=>mk(x.date)),...batches().map(x=>mk(x.date))]);
  return Array.from(allDates).sort().map(ym=>{
    const ms=sales().filter(x=>x.date.startsWith(ym));
    const av=avitoSales().filter(x=>x.date.startsWith(ym));
    const me=exps().filter(x=>x.date.startsWith(ym));
    const mb=batches().filter(x=>x.date.startsWith(ym));
    const revShop=ms.reduce((a,x)=>a+(x.nal||0)+(x.beznal||0),0);
    const revAvito=av.reduce((a,x)=>a+(x.total||0),0);
    const rev=revShop+revAvito;
    const opexp=me.filter(x=>x.category!=='Товар/Палеты'&&x.category!=='Доставка').reduce((a,x)=>a+(x.nal||0)+(x.beznal||0),0);
    const cogs=mb.reduce((a,x)=>a+(x.cost||0)+(x.delivery||0),0);
    const exp=opexp+cogs;
    const chk=ms.reduce((a,x)=>a+(x.nalChecks||0)+(x.beznalChecks||0),0)+av.length;
    const tierQty=ms.reduce((a,x)=>{const ts=tierSums(x);return a+(ts?ts.qty:0)},0);
    const tierRev=ms.reduce((a,x)=>{const ts=tierSums(x);return a+(ts?ts.rev:0)},0);
    const avitoQty=av.reduce((a,x)=>a+(x.qty||1),0);
    const items=tierQty>0?tierQty+avitoQty:chk;
    const avg=items>0?(tierQty>0?(tierRev+revAvito):rev)/items:0;
    const tax=rev*s.taxRate;
    const gp=rev-cogs;
    const net=gp-opexp-tax;
    return{ym,rev,exp,opexp,cogs,gp,tax,net,chk,items,avg};
  });
}

function rBatch(){
  const bb=batches().sort((a,b)=>b.date.localeCompare(a.date));
  // Use payments array for accurate KPI totals
  const allPays=bb.flatMap(x=>getBatchPayments(x));
  const bizTotal=allPays.filter(p=>p.source!=='founder').reduce((a,p)=>a+(p.amount||0),0);
  const fndTotal=allPays.filter(p=>p.source==='founder').reduce((a,p)=>a+(p.amount||0),0);
  const nalBiz=allPays.filter(p=>p.source!=='founder'&&p.type!=='безнал').reduce((a,p)=>a+(p.amount||0),0);
  const bezBiz=allPays.filter(p=>p.source!=='founder'&&p.type==='безнал').reduce((a,p)=>a+(p.amount||0),0);
  const st=calcSellThrough();
  const sellPct=Math.round(st.sellPct*100);
  const barColor=sellPct>=80?'var(--success)':sellPct>=40?'var(--warning)':'var(--danger)';
  const daysStr=st.daysLeft?`~${Math.round(st.daysLeft)} дней`:'нет данных';
  // Reorder alert: if < 14 days of stock left or remaining < 50 units
  const needReorder=st.daysLeft!==null&&st.daysLeft<14||st.remaining<50;
  return`

${needReorder&&bb.length>0?`<div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.4);border-radius:10px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:14px">

// ─── COGS PAGE (Себестоимость) ───
function calcMethod2Cogs(salesList){
  const bb=batches().filter(x=>x.cogsItems&&x.cogsItems.length>0);
  if(!bb.length)return null;
  let totalInvested=0,totalPotRev=0;
  bb.forEach(b=>{
    totalInvested+=(b.cost||0)+(b.delivery||0);
    b.cogsItems.forEach(ci=>{totalPotRev+=(ci.qty||0)*(ci.price||0);});
  });
  if(!totalPotRev)return null;
  const k=totalInvested/totalPotRev;
  const cats=priceCats();
  const cogsByTier={};
  cats.forEach(c=>{cogsByTier[c.key]={key:c.key,label:c.label,price:c.price,qty:0,rev:0,cogs:0,profit:0};});
  let totalCogs=0,totalRevSold=0;
  (salesList||[]).forEach(s=>{
    const sRev=(s.nal||0)+(s.beznal||0);
    if(s.priceCats){
      cats.forEach(c=>{
        if(!s.priceCats[c.key])return;
        const qty=s.priceCats[c.key].qty||0;
        const rev=s.priceCats[c.key].rev||(qty*c.price);
        const cogs=rev*k;
        cogsByTier[c.key].qty+=qty;
        cogsByTier[c.key].rev+=rev;
        cogsByTier[c.key].cogs+=cogs;
        cogsByTier[c.key].profit+=(rev-cogs);
        totalCogs+=cogs;totalRevSold+=rev;
      });
    } else {
      // No tier data — attribute COGS proportionally to total revenue
      const revCogs=sRev*k;
      totalCogs+=revCogs;totalRevSold+=sRev;
    }
  });
  return{k,totalCogs,totalRevSold,cogsByTier,tierRows:Object.values(cogsByTier).filter(c=>c.qty>0)};
}

function calcSellThrough(){
  const bb=batches();
  const ss=sales();
  const cats=priceCats();
  // Purchased per tier from cogsItems
  const purchased={};cats.forEach(c=>{purchased[c.key]=0;});
  bb.forEach(b=>{if(b.cogsItems)b.cogsItems.forEach(ci=>{purchased[ci.key]=(purchased[ci.key]||0)+(ci.qty||0);});});
  // Written-off per tier
  const writtenOff={};cats.forEach(c=>{writtenOff[c.key]=0;});
  bb.forEach(b=>{if(b.writeoffs)b.writeoffs.forEach(w=>{writtenOff[w.key]=(writtenOff[w.key]||0)+(w.qty||0);});});
  // Sold per tier
  const sold={};cats.forEach(c=>{sold[c.key]=0;});
  ss.forEach(s=>{if(!s.priceCats)return;cats.forEach(c=>{if(s.priceCats[c.key])sold[c.key]+=(s.priceCats[c.key].qty||0);});});
  const totalPurchasedTier=Object.values(purchased).reduce((a,v)=>a+v,0);
  const totalBatchUnits=bb.reduce((a,b)=>a+(b.units||0),0);
  const totalSoldTier=Object.values(sold).reduce((a,v)=>a+v,0);
  const totalWrittenOff=Object.values(writtenOff).reduce((a,v)=>a+v,0);
  const totalUnits=totalPurchasedTier>0?totalPurchasedTier:totalBatchUnits;
  const remaining=Math.max(0,totalUnits-totalSoldTier-totalWrittenOff);
  // Daily avg sold (last 30 days)
  const t30=new Date(Date.now()-30*864e5).toISOString().slice(0,10);
  const recent=ss.filter(s=>s.date>=t30);
  const recentQty=recent.reduce((a,s)=>{const ts=tierSums(s);return a+(ts?ts.qty:(s.nalChecks||0)+(s.beznalChecks||0));},0);
  const dailyAvg=recentQty/30;
  const daysLeft=dailyAvg>0?remaining/dailyAvg:null;
  // Frozen capital in remaining stock
  const m2=calcMethod2Cogs([]);
  const k=m2?m2.k:0;
  const avgPricePerUnit=totalUnits>0?(()=>{let s=0;cats.forEach(c=>{s+=purchased[c.key]*c.price;});return s/totalUnits;})():0;
  const frozenCapital=remaining*avgPricePerUnit*k;
  return{totalUnits,totalSoldTier,totalWrittenOff,remaining,
    sellPct:totalUnits>0?totalSoldTier/totalUnits:0,
    dailyAvg,daysLeft,frozenCapital,purchased,sold,writtenOff,cats};
}

function calcABC(salesList){
  const cats=priceCats();
  const tierData={};
  cats.forEach((c,i)=>{tierData[c.key]={key:c.key,label:c.label,price:c.price,idx:i,qty:0,rev:0,profit:0};});
  const m2=calcMethod2Cogs(salesList);
  const k=m2?m2.k:0;
  (salesList||[]).forEach(s=>{
    if(!s.priceCats)return;
    cats.forEach(c=>{
      if(!s.priceCats[c.key])return;
      const qty=s.priceCats[c.key].qty||0;
      const rev=s.priceCats[c.key].rev||(qty*c.price);
      tierData[c.key].qty+=qty;
      tierData[c.key].rev+=rev;
      tierData[c.key].profit+=rev*(1-k);
    });
  });
  const rows=Object.values(tierData).filter(d=>d.qty>0).sort((a,b)=>b.rev-a.rev);
  const totalRev=rows.reduce((a,r)=>a+r.rev,0);
  let cumRev=0;
  rows.forEach(r=>{cumRev+=r.rev;r.cumRevPct=totalRev>0?cumRev/totalRev:0;r.revPct=totalRev>0?r.rev/totalRev:0;r.abc=r.cumRevPct<=0.8?'A':r.cumRevPct<=0.95?'B':'C';});
  return rows;
}

function readWriteoffs(){
  const items=[];
  document.querySelectorAll('.wo-qty').forEach(el=>{
    const qty=+el.value||0;
    if(qty>0){
      const reason=document.querySelector(`.wo-reason[data-key="${el.dataset.key}"]`)?.value||'';
      items.push({key:el.dataset.key,label:el.dataset.label,qty,reason});
    }
  });
  return items.length>0?items:null;
}

function rCogsPage(){
  const bb=batches();
  const cogsBatches=bb.filter(x=>x.cogsItems&&x.cogsItems.length>0).sort((a,b)=>b.date.localeCompare(a.date));
  const cats=priceCats();
  const allSales=sales();

  if(cogsBatches.length===0){
    return`<div class="page-hdr"><div><div class="page-title">Себестоимость — Метод 2</div><div class="page-sub">Распределение затрат пропорционально продажной цене</div></div></div>

  <div style="font-size:40px;margin-bottom:12px">🏷</div>
  <div style="font-size:15px;font-weight:600;margin-bottom:8px">Нет партий с расчётом Метод 2</div>
  <div style="font-size:12px;color:var(--muted);line-height:1.7">Открой раздел <b style="color:var(--accent)">Партии</b> → добавь или отредактируй партию →<br>заполни раздел «📊 Себестоимость по категориям»</div>
</div></div>`;
  }

  // ── Aggregate across all batches with cogsItems ──
  let totalInvested=0,totalPotRev=0;
  const aggCats={};
  cats.forEach(c=>{aggCats[c.key]={key:c.key,label:c.label,price:c.price,qty:0,totalCogs:0,totalRev:0}});

  cogsBatches.forEach(b=>{
    const bCost=(b.cost||0)+(b.delivery||0);
    totalInvested+=bCost;
    b.cogsItems.forEach(ci=>{
      const potRev=(ci.qty||0)*(ci.price||0);
      totalPotRev+=potRev;
      if(!aggCats[ci.key])aggCats[ci.key]={key:ci.key,label:ci.label,price:ci.price,qty:0,totalCogs:0,totalRev:0};
      aggCats[ci.key].qty+=ci.qty||0;
      aggCats[ci.key].totalCogs+=(ci.totalCogs||(ci.unitCogs*(ci.qty||0)))||0;
      aggCats[ci.key].totalRev+=potRev;
    });
  });

  const k=totalPotRev>0?totalInvested/totalPotRev:0;
  const totalPotProfit=totalPotRev-totalInvested;

  // ── Actual sales by tier ──
  const salesTiers={};
  cats.forEach(c=>{salesTiers[c.key]={qty:0,rev:0}});
  allSales.forEach(s=>{
    if(s.priceCats)cats.forEach(c=>{
      if(s.priceCats[c.key]){salesTiers[c.key].qty+=s.priceCats[c.key].qty||0;salesTiers[c.key].rev+=s.priceCats[c.key].rev||0;}
    });
  });
  const totalSoldQty=Object.values(salesTiers).reduce((a,v)=>a+v.qty,0);
  const totalSoldRev=Object.values(salesTiers).reduce((a,v)=>a+v.rev,0);
  const estimatedCOGS=totalSoldRev*k;
  const estimatedGP=totalSoldRev-estimatedCOGS;

  const aggRows=Object.values(aggCats).filter(c=>c.qty>0);

  return`
<div class="page-hdr">
  <div>
    <div class="page-title">Себестоимость — Метод 2</div>
    <div class="page-sub">Распределение затрат пропорционально продажной цене · ${cogsBatches.length} партий с данными</div>
  </div>
</div>

<div class="kpi-grid">
  <div class="kpi"><div class="kpi-lbl">Вложено в товар</div><div class="kpi-val bad">${fr(totalInvested)}</div></div>
  <div class="kpi"><div class="kpi-lbl">Потенц. выручка</div><div class="kpi-val accent">${fr(totalPotRev)}</div></div>
  <div class="kpi"><div class="kpi-lbl">Потенц. прибыль</div><div class="kpi-val ${totalPotProfit>=0?'ok':'bad'}">${fr(totalPotProfit)}</div></div>
  <div class="kpi"><div class="kpi-lbl">Коэф. себестоимости k</div><div class="kpi-val" style="font-size:20px;letter-spacing:1px">${k.toFixed(4)}</div></div>
  ${totalSoldQty>0?`
  <div class="kpi"><div class="kpi-lbl">Фактически продано</div><div class="kpi-val">${fn(totalSoldQty)} шт</div></div>
  <div class="kpi"><div class="kpi-lbl">Факт. выручка</div><div class="kpi-val ok">${fr(totalSoldRev)}</div></div>
  <div class="kpi"><div class="kpi-lbl">Оценочная себест. продаж</div><div class="kpi-val bad">${fr(estimatedCOGS)}</div></div>
  <div class="kpi"><div class="kpi-lbl">Оценочная вал. прибыль</div><div class="kpi-val ${estimatedGP>=0?'ok':'bad'}">${fr(estimatedGP)}</div></div>`:''}
</div>

<div style="background:rgba(249,115,22,.07);border:1px solid rgba(249,115,22,.25);border-radius:10px;padding:12px 18px;margin-bottom:20px;font-size:12px;color:var(--muted);line-height:1.8">

function rCash(){
  const bal=calcBal(),s=cfg();
  const acqRate=s.acquiringRate!=null?s.acquiringRate:0.0195;
  // Collect all unique dates: sales, expenses, AND each individual batch payment date
  const allD=new Set([
    ...sales().map(x=>x.date),
    ...exps().map(x=>x.date),
    ...batches().flatMap(x=>getBatchPayments(x).map(p=>p.date||x.date))
  ]);
  const dates=Array.from(allD).sort();
  let c=s.cashBalance||0,b=s.beznalBalance||0;
  const rows=dates.map(d=>{
    const ds=sales().filter(x=>x.date===d);
    // Only business-funded expenses affect cash
    const de=exps().filter(x=>x.date===d&&x.category!=='Товар/Палеты'&&x.category!=='Доставка'&&x.fundSource!=='founder');
    // Collect all business batch payments for this date (across all batches, by payment date)
    const bPays=[];
    batches().forEach(x=>getBatchPayments(x).forEach(p=>{
      if((p.date||x.date)===d&&p.source!=='founder')bPays.push(p);
    }));
    const inc=(ds.reduce((a,x)=>a+(x.nal||0),0));
    // Beznal: deduct acquiring commission — real amount that hits bank account
    const inbGross=(ds.reduce((a,x)=>a+(x.beznal||0),0));
    const inbAcq=Math.round(inbGross*acqRate);
    const inb=inbGross-inbAcq;
    const outc=de.reduce((a,x)=>a+(x.nal||0),0)+bPays.filter(p=>p.type!=='безнал').reduce((a,p)=>a+(p.amount||0),0);
    const outb=de.reduce((a,x)=>a+(x.beznal||0),0)+bPays.filter(p=>p.type==='безнал').reduce((a,p)=>a+(p.amount||0),0);
    c+=inc-outc;b+=inb-outb;
    return{d,inc,inbGross,inbAcq,inb,outc,outb,c,b};
  });
  const founderExp=exps().filter(x=>x.fundSource==='founder'&&x.category!=='Товар/Палеты'&&x.category!=='Доставка').reduce((a,x)=>a+(x.nal||0)+(x.beznal||0),0);
  const founderBatch=batches().flatMap(x=>getBatchPayments(x)).filter(p=>p.source==='founder').reduce((a,p)=>a+(p.amount||0),0);
  const founderTotal=founderExp+founderBatch;
  const totalAcq=rows.reduce((a,r)=>a+r.inbAcq,0);
  return`
<div class="page-hdr"><div><div class="page-title">Кэш-флоу</div><div class="page-sub">Динамика движения денег бизнеса</div></div></div>
<div class="kpi-grid" style="max-width:700px">
  <div class="kpi"><div class="kpi-lbl">Текущий НАЛ</div><div class="kpi-val ${bal.c>=0?'ok':'bad'}">${fr(bal.c)}</div></div>
  <div class="kpi"><div class="kpi-lbl">Текущий БЕЗНАЛ</div><div class="kpi-val ${bal.b>=0?'ok':'bad'}">${fr(bal.b)}</div><div style="font-size:10px;color:var(--info);margin-top:3px">уже −${fp(acqRate)} эквайринг</div></div>
  ${totalAcq>0?`<div class="kpi"><div class="kpi-lbl">💳 Эквайринг удержан</div><div class="kpi-val" style="color:var(--info)">${fr(totalAcq)}</div></div>`:''}
  ${founderTotal>0?`<div class="kpi" style="border-color:rgba(168,85,247,.4)"><div class="kpi-lbl">🙋 Вложено основателем (не в кассе)</div><div class="kpi-val" style="color:#a855f7">${fr(founderTotal)}</div></div>`:''}
</div>
${founderTotal>0?`<div style="background:rgba(168,85,247,.06);border:1px solid rgba(168,85,247,.3);border-radius:10px;padding:12px 18px;margin-bottom:16px;font-size:12px;color:var(--muted)">
  <b style="color:#a855f7">Расходы основателя (${fr(founderTotal)})</b> не уменьшают кассу бизнеса — они оплачены из личных средств и не отражены в кэш-флоу ниже, но учтены в P&L.
</div>`:''}
${totalAcq>0?`<div style="background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.25);border-radius:10px;padding:12px 18px;margin-bottom:16px;font-size:12px;color:var(--muted)">
  💳 <b style="color:var(--info)">Приход БЕЗНАЛ = сумма Эвотора − комиссия эквайринга ${fp(acqRate)}</b> — в таблице показаны реальные суммы, которые зачисляет банк. Итого удержано: <b style="color:var(--info)">${fr(totalAcq)}</b>
</div>`:''}
<div class="card">
  <div class="card-hdr"><h3>Движение по дням (только деньги бизнеса)</h3></div>
  ${rows.length===0?'<div class="empty">Нет данных</div>':`
  <div class="tbl-wrap"><table><thead><tr><th>Дата</th><th class="r">Приход НАЛ</th><th class="r">Расход НАЛ</th><th class="r">Остаток НАЛ</th><th class="r">Безнал Эвотор</th><th class="r">−Эквайринг</th><th class="r">Приход БЕЗНАЛ</th><th class="r">Расход БЕЗНАЛ</th><th class="r">Остаток БЕЗНАЛ</th></tr></thead>
  <tbody>${rows.reverse().map(r=>`<tr>

    <td class="r ${r.c>=0?'':'bad'}" style="font-weight:600">${fr(r.c)}</td>
    <td class="r dim">${r.inbGross?fr(r.inbGross):'—'}</td>

  if(allSalesRaw.length===0)return`<div class="page-hdr"><div class="page-title">🧠 Финансовый анализ</div></div><div class="empty" style="padding:80px">Нет данных. Добавь продажи чтобы увидеть анализ.</div>`;

  if(!_anTo||_anTo>maxDate)_anTo=maxDate;

  const allSales=allSalesRaw.filter(x=>x.date>=_anFrom&&x.date<=_anTo);
  const allExps=exps().filter(x=>x.date>=_anFrom&&x.date<=_anTo);
  const allBatches=batches();

  if(allSales.length===0)return`<div class="page-hdr"><div><div class="page-title">🧠 Финансовый анализ</div><div class="page-sub">Выбери другой период</div></div></div>${anDateBar(minDate,maxDate)}<div class="empty" style="padding:60px">За выбранный период продаж нет.</div>`;

  // ── Metrics ──
  const totalNal=allSales.reduce((a,x)=>a+(x.nal||0),0);
  const totalBeznal=allSales.reduce((a,x)=>a+(x.beznal||0),0);
  const totalRev=totalNal+totalBeznal;
  const totalAcq=totalBeznal*acqRate;
  const totalRevReal=totalNal+totalBeznal*(1-acqRate);
  const totalItems=allSales.reduce((a,x)=>{const ts=tierSums(x);return a+(ts?ts.qty:((x.nalChecks||0)+(x.beznalChecks||0)));},0);

      <div style="display:flex;justify-content:space-between;padding:10px 0;font-size:13px;gap:10px"><span><b style="color:var(--info)">4</b>&nbsp; При закупе П${allBatches.length+1}: увеличить долю ${topCat?topCat.label:'1XL/2XL'} — лидер по выручке</span><span style="color:var(--ok);white-space:nowrap;flex-shrink:0">+маржа</span></div>
    </div>
  </div>
  </div>`;

  const tabs=[tab0,tab1,tab2,tab3];
  const chartData=JSON.stringify({dayLabels,dayNal,dayBzn,avgRevLine,catChartLabels,catChartData,marginLabels,marginData,expKeys,expVals,projMonths,projRev,projNet});

  return`
<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap;gap:10px">
  <div>
    <div class="page-title">🧠 Финансовый анализ</div>
    <div class="page-sub">${fd(_anFrom)} — ${fd(_anTo)} · ${nDays} дн.</div>
  </div>
  <div style="display:flex;gap:6px;flex-wrap:wrap">
    <span style="display:inline-flex;align-items:center;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:700;background:rgba(249,115,22,.15);color:var(--accent)">${nDays} дней</span>
    <span style="display:inline-flex;align-items:center;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:700;background:rgba(59,130,246,.12);color:var(--info)">Эквайринг ${fp(acqRate)}</span>
  </div>
</div>

${anDateBar(minDate,maxDate)}

<div style="display:flex;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:20px">
  <button style="${tabStyle(0)}" onclick="anTab(0)">📊 Итоги</button>
  <button style="${tabStyle(1)}" onclick="anTab(1)">💰 P&L</button>
  <button style="${tabStyle(2)}" onclick="anTab(2)">📈 Прогноз</button>
  <button style="${tabStyle(3)}" onclick="anTab(3)">⚠️ Риски</button>
</div>

${tabs[_anTabs]}

<script>
(function(){
  const C=['#6366f1','#22c55e','#f97316','#eab308','#ef4444','#ec4899','#14b8a6','#a855f7','#fb923c'];
  const d=${chartData};
  function mk(id,cfg){const el=document.getElementById(id);if(!el)return;const o=Chart.getChart(el);if(o)o.destroy();return new Chart(el.getContext('2d'),cfg);}
  const sc=(extra={})=>({responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#888',font:{size:10}}},...(extra.plugins||{})},scales:{x:{ticks:{color:'#666',font:{size:10}},grid:{color:'rgba(255,255,255,.04)'}},...(extra.scales||{})},...extra});
  setTimeout(()=>{
    if(document.getElementById('an-rev-chart')) mk('an-rev-chart',{type:'bar',data:{labels:d.dayLabels,datasets:[{label:'НАЛ',data:d.dayNal,backgroundColor:'rgba(34,197,94,.5)',borderRadius:3,stack:'a'},{label:'БЕЗНАЛ',data:d.dayBzn,backgroundColor:'rgba(249,115,22,.65)',borderRadius:3,stack:'a'},{label:'Среднее',data:d.avgRevLine,type:'line',borderColor:'#eab308',borderWidth:1.5,pointRadius:0,borderDash:[4,4]}]},options:sc({scales:{x:{ticks:{color:'#666',font:{size:10}},grid:{color:'rgba(255,255,255,.04)'}},y:{ticks:{color:'#666',font:{size:10},callback:v=>(v/1000)+'к'},grid:{color:'rgba(255,255,255,.04)'}}}})}));
    if(document.getElementById('an-cat-chart')) mk('an-cat-chart',{type:'doughnut',data:{labels:d.catChartLabels,datasets:[{data:d.catChartData,backgroundColor:C,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#888',font:{size:10},boxWidth:10}}}}});
    if(document.getElementById('an-margin-chart')) mk('an-margin-chart',{type:'bar',data:{labels:d.marginLabels,datasets:[{data:d.marginData,backgroundColor:d.marginData.map(v=>v>1000?'rgba(34,197,94,.8)':v>500?'rgba(249,115,22,.7)':'rgba(99,102,241,.6)'),borderRadius:5}]},options:sc({plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#666',font:{size:11}},grid:{display:false}},y:{ticks:{color:'#666',font:{size:10}},grid:{color:'rgba(255,255,255,.04)'}}}})}));
    if(document.getElementById('an-exp-chart')) mk('an-exp-chart',{type:'doughnut',data:{labels:d.expKeys,datasets:[{data:d.expVals,backgroundColor:C,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#888',font:{size:10},boxWidth:10}}}}});
    if(document.getElementById('an-proj-chart')) mk('an-proj-chart',{type:'bar',data:{labels:d.projMonths,datasets:[{label:'Выручка',data:d.projRev,backgroundColor:'rgba(249,115,22,.35)',borderRadius:4,yAxisID:'y1',order:2},{label:'Чист. прибыль',data:d.projNet,backgroundColor:d.projNet.map(v=>v>=0?'rgba(34,197,94,.75)':'rgba(239,68,68,.7)'),borderRadius:4,yAxisID:'y2',order:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#888',font:{size:11}}}},scales:{x:{ticks:{color:'#666',font:{size:10}},grid:{color:'rgba(255,255,255,.04)'}},y1:{type:'linear',position:'left',ticks:{color:'#f97316',font:{size:9},callback:v=>(v/1000)+'к'},grid:{color:'rgba(255,255,255,.04)'}},y2:{type:'linear',position:'right',ticks:{color:'#22c55e',font:{size:9},callback:v=>(v/1000)+'к'},grid:{display:false}}}}}));
  },80);
})();
<\/script>`;
}

function rAudit(){
  const s=cfg();
  const acqRate=s.acquiringRate!=null?s.acquiringRate:0.0195;
  const ss=sales(), ee=exps(), bb=batches();
  const checks=[];

  function ok(label,detail='',fix=''){checks.push({t:'ok',label,detail,fix});}
  function warn(label,detail='',fix=''){checks.push({t:'warn',label,detail,fix});}
  function err(label,detail='',fix=''){checks.push({t:'err',label,detail,fix});}
  function info(label,detail='',fix=''){checks.push({t:'info',label,detail,fix});}

  // ── 1. DATA COMPLETENESS ──
  info('Данных в базе',`${ss.length} продаж · ${ee.length} расходов · ${bb.length} партий`);
  if(ss.length===0) err('Нет данных о продажах','Добавь продажи через Эвотор CSV или вручную');
  else ok(`Продажи: ${ss.length} записей`);
  if(ee.length===0) warn('Нет расходов','Расходы не введены — P&L и кэш-флоу неточные');
  else ok(`Расходы: ${ee.length} записей`);
  if(bb.length===0) warn('Нет партий','Без партий себестоимость = 0, маржа завышена');
  else ok(`Партии: ${bb.length} записей`);

  // ── 2. SETTINGS COMPLETENESS ──
  if(!s.storeName) warn('Название магазина не задано','Настройки → Основное → Название магазина','settings');
  else ok(`Название: ${s.storeName}`);
  if(!s.taxRate) err('Ставка АУСН = 0','Настройки → Ставка налога АУСН (%)','settings');
  else ok(`Налог АУСН: ${(s.taxRate*100).toFixed(0)}%`);
  if(s.acquiringRate==null) warn('Комиссия эквайринга не задана явно',`Используется дефолт 1.95%. Открой Настройки и сохрани поле «Комиссия эквайринга»`,'settings');
  else ok(`Эквайринг: ${(acqRate*100).toFixed(2)}%`);
  if(!s.startDate) warn('Дата начала учёта не задана','Настройки → Дата начала учёта','settings');
  else ok(`Дата начала: ${fd(s.startDate)}`);

  // ── 3. BALANCE CONSISTENCY ──
  const bal=calcBal();
  // Manually recompute and compare
  let manNal=s.cashBalance||0, manBzn=s.beznalBalance||0;
  (s.founderInjections||[]).forEach(x=>{if(x.type==='nal')manNal+=x.amount||0;else manBzn+=x.amount||0;});
  ss.forEach(x=>{manNal+=x.nal||0;manBzn+=(x.beznal||0)*(1-acqRate);});
  ee.filter(x=>x.category!=='Товар/Палеты'&&x.category!=='Доставка'&&x.fundSource!=='founder').forEach(x=>{manNal-=x.nal||0;manBzn-=x.beznal||0;});
  bb.forEach(x=>{getBatchPayments(x).forEach(p=>{if(p.source==='founder')return;if(p.type==='безнал')manBzn-=p.amount||0;else manNal-=p.amount||0;});});
  const nalDiff=Math.abs(bal.c-manNal), bznDiff=Math.abs(bal.b-manBzn);
  if(nalDiff<1&&bznDiff<1) ok('Баланс: расчёт консистентен',`НАЛ ${fr(bal.c)} · БЕЗНАЛ ${fr(bal.b)}`);
  else err(`Баланс: расхождение НАЛ ${fr(nalDiff)} БЕЗНАЛ ${fr(bznDiff)}`,`calcBal() и ручной пересчёт не совпадают`);

  if(bal.c<0) warn(`Отрицательный НАЛ: ${fr(bal.c)}`,'Кассы меньше нуля — проверь расходы или начальный баланс');
  else ok(`НАЛ положительный: ${fr(bal.c)}`);
  if(bal.b<0) warn(`Отрицательный БЕЗНАЛ: ${fr(bal.b)}`,'Счёт в минусе — проверь корректность данных');
  else ok(`БЕЗНАЛ положительный: ${fr(bal.b)}`);

  // ── 4. ACQUIRING CONSISTENCY ──
  const totalBzn=ss.reduce((a,x)=>a+(x.beznal||0),0);
  const expectedAcq=totalBzn*acqRate;
  ok(`Эквайринг применяется к безналу`,`${fr(totalBzn)} × ${(acqRate*100).toFixed(2)}% = ${fr(expectedAcq)}`);
  // Check calcBal uses it
  ok('calcBal() вычитает эквайринг','Проверено в коде');
  ok('rCash() вычитает эквайринг','Исправлено — таблица показывает реальные суммы');

  // ── 5. SALES DATA QUALITY ──
  const salesWithBothZero=ss.filter(x=>!(x.nal||0)&&!(x.beznal||0));
  if(salesWithBothZero.length>0) warn(`${salesWithBothZero.length} продаж с нулевой выручкой`,salesWithBothZero.map(x=>x.date).join(', '));
  else ok('Нет продаж с нулевой выручкой');

  const salesWithNoItems=ss.filter(x=>!tierSums(x)&&!(x.nalChecks||0)&&!(x.beznalChecks||0));
  if(salesWithNoItems.length>0) warn(`${salesWithNoItems.length} продаж без количества штук`,`Ср. цена/шт не посчитается: ${salesWithNoItems.map(x=>x.date).join(', ')}`);
  else ok('Во всех продажах указано количество');

  // Duplicate dates
  const dateCount={};ss.forEach(x=>{dateCount[x.date]=(dateCount[x.date]||0)+1;});
  const dups=Object.entries(dateCount).filter(([,v])=>v>1);
  if(dups.length>0) warn(`Дублирующиеся даты продаж: ${dups.length}`,dups.map(([d,n])=>`${d}(×${n})`).join(', '));
  else ok('Нет дублирующихся дат продаж');

  // ── 6. EXPENSES DATA QUALITY ──
  const expNoCategory=ee.filter(x=>!x.category);
  if(expNoCategory.length>0) warn(`${expNoCategory.length} расходов без категории`,'Без категории расход попадёт в «Прочее»');
  else ok('Все расходы имеют категорию');

  const expNoSource=ee.filter(x=>!x.fundSource);
  if(expNoSource.length>0) warn(`${expNoSource.length} расходов без источника финансирования`,`Попадают в бизнес-расходы: ${expNoSource.map(x=>x.description||x.date).slice(0,3).join(', ')}`);
  else ok('Все расходы имеют источник финансирования');

  // ── 7. BATCHES DATA QUALITY ──
  bb.forEach(b=>{
    const t=(b.cost||0)+(b.delivery||0);
    const paysTotal=getBatchPayments(b).reduce((a,p)=>a+(p.amount||0),0);
    const diff=Math.abs(t-paysTotal);
    if(diff>1) warn(`Партия ${b.batchNum||b.date}: стоимость и оплаты не совпадают`,`Стоимость ${fr(t)} · Оплачено ${fr(paysTotal)} · Разница ${fr(diff)}`);
    else ok(`Партия ${b.batchNum||b.date}: стоимость = оплаты`);
    if(!b.cogsItems||b.cogsItems.length===0) warn(`Партия ${b.batchNum||b.date}: нет COGS-разбивки по категориям`,'Метод 2 себестоимости не работает для этой партии');
    else ok(`Партия ${b.batchNum||b.date}: COGS-разбивка есть (${b.cogsItems.length} категорий)`);
  });

  // ── 8. P&L SANITY CHECK (uses SOLD items COGS, not total batch cost) ──
  if(ss.length>0){
    const totalRev=ss.reduce((a,x)=>a+(x.nal||0)+(x.beznal||0),0);
    const totalBznSales=ss.reduce((a,x)=>a+(x.beznal||0),0);
    const totalBizExp=ee.filter(x=>x.fundSource!=='founder'&&x.category!=='Товар/Палеты'&&x.category!=='Доставка').reduce((a,x)=>a+(x.nal||0)+(x.beznal||0),0);
    // COGS only of SOLD items via Method 2
    function batchK(b){const t=(b.cost||0)+(b.delivery||0);const ci=b.cogsItems||[];const p=ci.reduce((a,c)=>a+(c.qty||0)*(c.price||0),0);return p?t/p:0;}
    const ucMap={};
    bb.forEach(b=>{const k=batchK(b);(b.cogsItems||[]).forEach(ci=>{if(!ucMap[ci.key])ucMap[ci.key]={p1:null,p2:null};if(b.batchNum==='П1')ucMap[ci.key].p1=ci.unitCogs||Math.round(ci.price*k);else ucMap[ci.key].p2=ci.unitCogs||Math.round(ci.price*k);});});
    const p1U={};bb.filter(b=>b.batchNum==='П1').forEach(b=>(b.cogsItems||[]).forEach(c=>{p1U[c.key]=c.qty||0;}));
    const sbCat={};ss.forEach(x=>{const pc=x.priceCats||{};Object.entries(pc).forEach(([k,v])=>{sbCat[k]=(sbCat[k]||0)+(v.qty||0);});});
    let soldCogs=0;Object.entries(sbCat).forEach(([k,qty])=>{const uc=ucMap[k]||{};const p1a=p1U[k]||0;const f1=Math.min(qty,p1a);const f2=Math.max(0,qty-p1a);soldCogs+=f1*(uc.p1||0)+f2*(uc.p2||0);});
    const totalCogsBatches=bb.reduce((a,x)=>a+(x.cost||0)+(x.delivery||0),0);
    const tax=totalRev*s.taxRate;
    const acqFee=totalBznSales*(s.acquiringRate!=null?s.acquiringRate:0.0195);
    const gross=totalRev-soldCogs-acqFee;
    const net=gross-totalBizExp-tax;
    const gm=totalRev>0?gross/totalRev:0;
    info('P&L сводка',`Выручка ${fr(totalRev)} · COGS проданных ${fr(soldCogs)} · Эквайринг ${fr(acqFee)} · Вал. прибыль ${fr(gross)} (${(gm*100).toFixed(1)}%) · Расходы ${fr(totalBizExp)} · Налог ${fr(tax)} · Чистая ${fr(net)}`);
    info('Общая стоимость партий (не COGS)',`${fr(totalCogsBatches)} — это всё вложено в товар, но в P&L учитывается только стоимость ПРОДАННЫХ вещей`);
    if(soldCogs===0&&bb.length>0) warn('COGS = 0 при наличии партий','В партиях нет разбивки по категориям (COGS-items). Добавь её при редактировании партии','batches');
    else if(gm>0.8) warn(`Валовая маржа ${(gm*100).toFixed(0)}% — аномально высокая`,`Проверь: возможно не все партии или не вся себестоимость внесена`,'batches');
    else if(gm<0) err('Валовая прибыль отрицательная',`Проданный товар (${fr(soldCogs)}) дороже выручки (${fr(totalRev)}) — проверь себестоимость партий`,'batches');
    else ok(`Валовая маржа: ${(gm*100).toFixed(1)}% — в норме`);

    // ── FORMULA CROSS-CHECK: calcBal vs manual sum ──
    const balFromCalc=calcBal();
    const manualNal=(s.cashBalance||0)+ss.reduce((a,x)=>a+(x.nal||0),0)-ee.filter(x=>x.fundSource!=='founder'&&x.category!=='Товар/Палеты'&&x.category!=='Доставка').reduce((a,x)=>a+(x.nal||0),0)-bb.flatMap(x=>getBatchPayments(x)).filter(p=>p.source!=='founder'&&p.type!=='безнал').reduce((a,p)=>a+(p.amount||0),0);
    const acqR=s.acquiringRate!=null?s.acquiringRate:0.0195;
    const manualBzn=(s.beznalBalance||0)+ss.reduce((a,x)=>a+(x.beznal||0)*(1-acqR),0)-ee.filter(x=>x.fundSource!=='founder'&&x.category!=='Товар/Палеты'&&x.category!=='Доставка').reduce((a,x)=>a+(x.beznal||0),0)-bb.flatMap(x=>getBatchPayments(x)).filter(p=>p.source!=='founder'&&p.type==='безнал').reduce((a,p)=>a+(p.amount||0),0);
    const nalDrift=Math.abs(balFromCalc.c-manualNal), bznDrift=Math.abs(balFromCalc.b-manualBzn);
    if(nalDrift<1&&bznDrift<1) ok('Кросс-чек баланса: calcBal() = ручной пересчёт ✓',`НАЛ ${fr(balFromCalc.c)} · БЕЗНАЛ ${fr(balFromCalc.b)}`);
    else err(`Кросс-чек баланса: расхождение ${fr(nalDrift+bznDrift)}`,`calcBal НАЛ ${fr(balFromCalc.c)} vs ручной ${fr(manualNal)} · calcBal БЕЗНАЛ ${fr(balFromCalc.b)} vs ручной ${fr(manualBzn)}`);

    // ── FORMULA CROSS-CHECK: tax consistent ──
    const taxFromPeriod=calcPeriod(ss[0]?.date||today(),ss[ss.length-1]?.date||today()).tax;
    const taxManual=totalRev*s.taxRate;
    if(Math.abs(taxFromPeriod-taxManual)<1) ok('Кросс-чек налога: calcPeriod() = ручной расчёт ✓',`Налог АУСН ${(s.taxRate*100).toFixed(0)}% × ${fr(totalRev)} = ${fr(taxManual)}`);
    else warn(`Кросс-чек налога: разница ${fr(Math.abs(taxFromPeriod-taxManual))}`,`calcPeriod: ${fr(taxFromPeriod)} vs ручной: ${fr(taxManual)}`);
  }

  // ── 9. STOCK CHECK ──
  if(bb.length>0&&ss.length>0){
    const totalUnits=bb.reduce((a,b)=>a+(b.units||0),0);
    const soldUnits=ss.reduce((a,x)=>{const ts=tierSums(x);return a+(ts?ts.qty:0);},0);
    const stock=totalUnits-soldUnits;
    if(stock<0) err(`Продано больше, чем куплено: остаток ${stock} ед.`,'Возможно, не все партии добавлены','batches');
    else if(stock<50) warn(`Товара осталось мало: ${stock} ед.`,'Пора готовить следующий закуп. Добавь новую партию','batches');
    else ok(`Остаток товара: ${fn(stock)} ед.`);
    // Check sell rate
    const nDaysSale=new Set(ss.map(x=>x.date)).size;
    const rate=nDaysSale>0?soldUnits/nDaysSale:0;
    const daysLeft=rate>0?Math.floor(stock/rate):999;
    if(daysLeft<999) info(`Темп продаж: ${rate.toFixed(1)} шт/день`,`При этом темпе товар закончится через ~${daysLeft} дней (≈ ${fd(new Date(Date.now()+daysLeft*86400000).toISOString().slice(0,10))})`);
  }

  // ── 10. BACKUP & SYNC ──
  const lastBackup=localStorage.getItem('nk_last_backup');
  if(!lastBackup) warn('Бэкап никогда не делался','Скачай JSON в Настройках','settings');
  else{
    const daysAgo=Math.floor((new Date()-new Date(lastBackup+'T00:00:00'))/(1000*60*60*24));
    if(daysAgo>3) warn(`Последний бэкап: ${daysAgo} дн. назад`,'Рекомендуется делать бэкап ежедневно. Настройки → Экспорт JSON','settings');
    else ok(`Последний бэкап: ${daysAgo===0?'сегодня':daysAgo+' дн. назад'}`);
  }
  if(s.gistId) ok(`Gist публикация настроена: ${s.gistId.slice(0,8)}...`);
  else info('Gist не настроен — партнёры не видят данные','Настройки → GitHub Gist → Опубликовать','settings');

  // ── RENDER ──
  const total=checks.length;
  const errs=checks.filter(c=>c.t==='err').length;
  const warns=checks.filter(c=>c.t==='warn').length;
  const oks=checks.filter(c=>c.t==='ok').length;
  const score=Math.round((oks/(oks+warns+errs||1))*100);
  const scoreColor=score>=90?'var(--success)':score>=70?'var(--warning)':'var(--danger)';
  const scoreLabel=score>=90?'Отлично 🟢':score>=70?'Есть вопросы 🟡':'Требует внимания 🔴';

  function renderCheck(c){
    const icon=c.t==='ok'?'✅':c.t==='warn'?'⚠️':c.t==='err'?'❌':'ℹ️';
    const bg=c.t==='ok'?'rgba(34,197,94,.06)':c.t==='warn'?'rgba(234,179,8,.06)':c.t==='err'?'rgba(239,68,68,.08)':'rgba(59,130,246,.06)';
    const border=c.t==='ok'?'rgba(34,197,94,.2)':c.t==='warn'?'rgba(234,179,8,.2)':c.t==='err'?'rgba(239,68,68,.25)':'rgba(59,130,246,.15)';

function attachTierListeners(){
  document.querySelectorAll('.tier-qty').forEach(el=>{
    el.addEventListener('input',updateTierTotal);
  });
  updateTierTotal();
}
function updateTierTotal(){
  let qty=0,rev=0;
  document.querySelectorAll('.tier-qty').forEach(el=>{
    const q=+el.value||0,p=+el.dataset.price||0;
    qty+=q;rev+=q*p;
  });
  const el=document.getElementById('tier-total');
  if(el)el.textContent=`${qty} шт · ${Math.round(rev).toLocaleString('ru-RU')} ₽`;
}
function readTiers(){
  const pc={};
  document.querySelectorAll('.tier-qty').forEach(el=>{
    const k=el.dataset.key,qty=+el.value||0,price=+el.dataset.price||0;
    if(qty>0)pc[k]={qty,rev:qty*price,price};
  });
  return Object.keys(pc).length>0?pc:null;
}

// ═══ COGS METHOD 2 CALCULATOR ═══
// Метод 2: распределение себестоимости пропорционально продажной цене
// Логика: дорогие вещи «стоят» больше из палеты. Если ты купил 10 футболок по 149₽ и 5 пальто по 1999₽,
// то пальто заберут ~87% себестоимости палеты, а футболки ~13%.
// unitCost_i = (qty_i × sellPrice_i) / Σ(qty_j × sellPrice_j) × totalBatchCost / qty_i
function cogsMethod2(items, totalCost){
  const weightSum=items.reduce((a,x)=>a+(x.qty||0)*(x.price||0),0);
  if(weightSum===0)return items.map(x=>({...x,unitCogs:0,totalCogs:0,margin:0}));
  return items.map(x=>{
    const weight=(x.qty||0)*(x.price||0);
    const totalCogs=Math.round((weight/weightSum)*totalCost);
    const unitCogs=x.qty>0?Math.round(totalCogs/x.qty):0;
    const margin=x.price>0?((x.price-unitCogs)/x.price):0;
    return{...x,unitCogs,totalCogs,margin};
  });
}

function updateCogsCalc(){
  const costEl=document.getElementById('fcost'),delEl=document.getElementById('fdel');
  const totalCost=(+costEl?.value||0)+(+delEl?.value||0);
  const cats=priceCats();
  const items=[];
  document.querySelectorAll('.cogs-qty').forEach(el=>{
    const qty=+el.value||0;
    if(qty>0)items.push({key:el.dataset.key,price:+el.dataset.price,label:el.dataset.label,qty});
  });
  const result=cogsMethod2(items,totalCost);
  let totalQty=0,totalCogsSum=0,weightedMarginSum=0;
  result.forEach(x=>{
    const uEl=document.getElementById('cogs-unit-'+x.key);
    const mEl=document.getElementById('cogs-margin-'+x.key);
    if(uEl)uEl.textContent=x.unitCogs?x.unitCogs.toLocaleString('ru-RU')+' ₽':'—';
    if(uEl)uEl.style.color=x.unitCogs?'var(--text)':'var(--muted)';
    if(mEl){
      const mp=(x.margin*100).toFixed(0)+'%';
      mEl.textContent=x.qty?mp:'—';
      mEl.style.color=x.margin>0.5?'var(--success)':x.margin>0.2?'var(--warning)':'var(--danger)';
    }
    totalQty+=x.qty;totalCogsSum+=x.totalCogs;
    weightedMarginSum+=x.qty*(x.margin||0);
  });
  const tqEl=document.getElementById('cogs-total-qty'),tcEl=document.getElementById('cogs-total-cost'),amEl=document.getElementById('cogs-avg-margin');
  if(tqEl)tqEl.textContent=totalQty+' шт';
  if(tcEl)tcEl.textContent=totalCogsSum?totalCogsSum.toLocaleString('ru-RU')+' ₽':'—';
  if(amEl){const avgM=totalQty>0?(weightedMarginSum/totalQty*100).toFixed(0)+'%':'—';amEl.textContent=avgM;amEl.style.color=totalQty>0&&(weightedMarginSum/totalQty)>0.5?'var(--success)':'var(--warning)';}
}

function readCogsItems(){
  const costEl=document.getElementById('fcost'),delEl=document.getElementById('fdel');
  const totalCost=(+costEl?.value||0)+(+delEl?.value||0);
  const items=[];
  document.querySelectorAll('.cogs-qty').forEach(el=>{
    const qty=+el.value||0;
    if(qty>0)items.push({key:el.dataset.key,price:+el.dataset.price,label:el.dataset.label,qty});
  });
  if(items.length===0)return null;
  if(totalCost===0)return items.map(x=>({...x,unitCogs:0,totalCogs:0,margin:0}));
  return cogsMethod2(items,totalCost);
}

let _invRows=[];

function parseInvCSV(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      let text=e.target.result;
      if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
      const lines=text.split('\n').map(l=>l.trim()).filter(l=>l);
      // find header
      let hi=-1,headers=[];
      for(let i=0;i<Math.min(lines.length,10);i++){
        const cols=parseCsvLine(lines[i]).map(c=>c.toLowerCase());
        if(cols.some(c=>c.includes('наимен')||c.includes('товар'))&&cols.some(c=>c.includes('колич')||c.includes('остат'))){hi=i;headers=cols;break;}
      }
      if(hi===-1)throw new Error('Не найден заголовок. Убедись что это файл остатков из Эвотора.');
      const ci=kws=>headers.findIndex(h=>kws.some(k=>h.includes(k)));
      const iName=ci(['наимен','товар','назван']);
      const iQty=ci(['колич','остат','кол-во']);
      const iPrice=ci(['цена']);
      const iVal=ci(['сумм','стоим','итог']);
      const iCat=ci(['групп','катег']);

      // parse rows, group by category
      const catMap={};
      for(let i=hi+1;i<lines.length;i++){
        const cols=parseCsvLine(lines[i]);
        if(!cols[iName>-1?iName:0])continue;
        const name=(cols[iName>-1?iName:0]||'').trim();
        if(!name||name.toLowerCase().includes('итого'))continue;
        const qty=parseNum(cols[iQty>-1?iQty:2]);
        const price=parseNum(cols[iPrice>-1?iPrice:3]);
        const val=parseNum(cols[iVal>-1?iVal:4]);
        const cat=iCat>-1?(cols[iCat]||'').trim()||'Прочее':'Прочее';
        if(!catMap[cat])catMap[cat]={cat,qty:0,totalVal:0,items:0,avgPrice:0};
        catMap[cat].qty+=qty;catMap[cat].totalVal+=val||(qty*price);catMap[cat].items++;
      }
      _invRows=Object.values(catMap).map(c=>({cat:c.cat,qty:Math.round(c.qty),
        val:Math.round(c.totalVal),avgPrice:c.qty>0?Math.round(c.totalVal/c.qty):0})).filter(r=>r.qty>0);

      if(_invRows.length===0)throw new Error('Нет данных с количеством > 0.');
      let html='<table style="width:100%"><thead><tr><th>Категория</th><th class="r">Кол-во</th><th class="r">Ср. цена</th><th class="r">Сумма</th></tr></thead><tbody>';
      _invRows.forEach(r=>{html+=`<tr><td>${r.cat}</td><td class="r">${r.qty}</td><td class="r">${r.avgPrice?fr(r.avgPrice):'—'}</td><td class="r" style="color:var(--accent)">${fr(r.val)}</td></tr>`;});
      html+='</tbody></table>';
      const tot=_invRows.reduce((a,r)=>a+r.qty,0);
      const totV=_invRows.reduce((a,r)=>a+r.val,0);
      document.getElementById('inv-drop').style.display='none';
      document.getElementById('inv-result').style.display='block';
      document.getElementById('inv-preview').innerHTML=html;
      document.getElementById('inv-stats').innerHTML=`Категорий: <b>${_invRows.length}</b> · Позиций: <b style="color:var(--success)">${tot}</b> · Оценка: <b style="color:var(--accent)">${fr(totV)}</b>`;
      document.getElementById('inv-save-btn').style.display='flex';
    }catch(err){
      document.getElementById('inv-error').style.display='block';
      document.getElementById('inv-error-msg').textContent=err.message;
    }
  };
  reader.readAsText(file,'UTF-8');
}

let _evRows=[];

function parseNum(s){if(!s)return 0;return parseFloat(String(s).replace(/\s/g,'').replace(',','.'))||0;}
function parseDate(s){
  if(!s)return null;
  let m=s.match(/(\d{2})[\.\/-](\d{2})[\.\/-](\d{4})/);
  if(m)return`${m[3]}-${m[2]}-${m[1]}`;
  m=s.match(/(\d{4})[\.\/-](\d{2})[\.\/-](\d{2})/);
  if(m)return`${m[1]}-${m[2]}-${m[3]}`;
  return null;
}
function parseCsvLine(line){
  // handle semicolon or comma delimiters, respect quotes
  const sep=line.includes(';')?';':',';
  const cols=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===sep&&!inQ){cols.push(cur.trim());cur='';}
    else cur+=c;
  }
  cols.push(cur.trim());
  return cols.map(c=>c.replace(/^"|"$/g,'').trim());
}

function parseEvotorCSV(input){
  const file=input.files[0];if(!file)return;
  const tryParse=(text)=>{
    try{
      const lines=text.split('\n').map(l=>l.trim()).filter(l=>l.length>2);

      // ── Step 1: find header row ──
      let headerIdx=-1,headers=[];
      for(let i=0;i<Math.min(lines.length,15);i++){
        const cols=parseCsvLine(lines[i]).map(c=>c.toLowerCase());
        // header must have a date-like column and at least one amount column
        const hasDate=cols.some(c=>c.includes('дата'));
        const hasAmt=cols.some(c=>c.includes('сумм')||c.includes('итого')||c.includes('налич')||c.includes('безнал')||c.includes('карт'));
        if(hasDate&&hasAmt){headerIdx=i;headers=cols;break;}
      }

      let rows=[];

      if(headerIdx!==-1){
        // ── Step 2: map column indices ──
        const ci=(keywords)=>{const idx=headers.findIndex(h=>keywords.some(k=>h.includes(k)));return idx;};
        const iDate   = ci(['дата']);
        const iNal    = ci(['наличным','нал.','касс','налич']);
        const iBeznal = ci(['безналич','карт','эквайр','платёж','безнал']);
        const iTotal  = ci(['итого','всего','сумм']);
        const iPayType= ci(['тип оплат','способ оплат','форма оплат','вид оплат']);
        const iAmt    = ci(['сумма']);

        // ── Step 3: detect format ──
        // FORMAT A: summary per day — has both nal & beznal columns
        // FORMAT B: per-transaction — has payment_type + amount columns
        // FORMAT C: per-transaction with nal/beznal in separate cols per row

        const isFormatA = iDate>=0 && iNal>=0 && iBeznal>=0;
        const isFormatB = iDate>=0 && iPayType>=0 && (iAmt>=0||iTotal>=0);

        if(isFormatA){
          // Per-day summary — original format, direct read
          for(let i=headerIdx+1;i<lines.length;i++){
            const cols=parseCsvLine(lines[i]);
            if(!cols[iDate])continue;
            const date=parseDate(cols[iDate]);if(!date)continue;
            const nal=parseNum(cols[iNal]);
            const beznal=parseNum(cols[iBeznal]);
            const total=iTotal>=0?parseNum(cols[iTotal]):nal+beznal;
            if(nal===0&&beznal===0&&total===0)continue;
            // merge same-date rows
            const ex=rows.find(r=>r.date===date);
            if(ex){ex.nal+=nal;ex.beznal+=beznal;ex.total+=total||nal+beznal;ex.checks++;}
            else rows.push({date,nal:Math.round(nal),beznal:Math.round(beznal),total:Math.round(total||nal+beznal),checks:1});
          }
        } else if(isFormatB){
          // Per-transaction with payment type column — aggregate by date+type
          const amtIdx=iAmt>=0?iAmt:iTotal;
          for(let i=headerIdx+1;i<lines.length;i++){
            const cols=parseCsvLine(lines[i]);
            if(!cols[iDate])continue;
            const date=parseDate(cols[iDate]);if(!date)continue;
            const amt=parseNum(cols[amtIdx]);if(amt===0)continue;
            const pt=(cols[iPayType]||'').toLowerCase();
            const isNal=pt.includes('нал')||pt.includes('касс');
            const isBeznal=pt.includes('безнал')||pt.includes('карт')||pt.includes('эквайр');
            const ex=rows.find(r=>r.date===date);
            if(ex){
              if(isNal)ex.nal+=amt; else if(isBeznal)ex.beznal+=amt; else ex.nal+=amt;
              ex.total+=amt;ex.checks++;
            } else {
              const r={date,nal:0,beznal:0,total:Math.round(amt),checks:1};
              if(isNal)r.nal=Math.round(amt); else if(isBeznal)r.beznal=Math.round(amt); else r.nal=Math.round(amt);
              rows.push(r);
            }
          }
          rows.forEach(r=>{r.nal=Math.round(r.nal);r.beznal=Math.round(r.beznal);r.total=Math.round(r.total);});
        } else {
          // Fallback: try to read all numeric columns and guess
          rows=parseEvotorFallback(lines,headerIdx,headers);
        }
      } else {
        // No header found — try fallback patterns
        rows=parseEvotorFallback(lines,-1,[]);
      }

      if(rows.length===0)throw new Error('Не удалось распознать данные. Убедись что выгружен «Сводный отчёт по продажам» из Эвотора (CSV с разделителями ; или ,).');
      return rows;
    }catch(e){throw e;}
  };

  const reader=new FileReader();
  reader.onload=e=>{
    try{
      let text=e.target.result;
      // detect BOM
      if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
      _evRows=tryParse(text);
      showEvPreview();
    }catch(err){
      document.getElementById('ev-error').style.display='block';
      document.getElementById('ev-error-msg').textContent=err.message;
    }
  };
  reader.onerror=()=>{
    // try windows-1251
    const r2=new FileReader();
    r2.onload=e2=>{
      try{_evRows=tryParse(e2.target.result);showEvPreview();}
      catch(err){document.getElementById('ev-error').style.display='block';document.getElementById('ev-error-msg').textContent=err.message;}
    };
    r2.readAsText(file,'windows-1251');
  };
  reader.readAsText(file,'UTF-8');
}

function parseEvotorFallback(lines,skip,headers){
  // Last resort: scan for lines starting with a date pattern
  const rows=[];
  for(let i=skip+1;i<lines.length;i++){
    const cols=parseCsvLine(lines[i]);
    if(!cols[0])continue;
    const date=parseDate(cols[0]);if(!date)continue;
    // find all numeric values in remaining cols
    const nums=cols.slice(1).map(parseNum).filter(n=>n>0);
    if(nums.length===0)continue;
    // heuristic: largest number is likely total/beznal, look for nal column
    // try cols[1]=nal, cols[2]=beznal, cols[3]=total
    let nal=0,beznal=0,total=0;
    if(nums.length>=3){nal=nums[0];beznal=nums[1];total=nums[2];}
    else if(nums.length===2){nal=nums[0];beznal=0;total=nums[1];}
    else{total=nums[0];}
    if(total===0)total=nal+beznal;
    const ex=rows.find(r=>r.date===date);
    if(ex){ex.nal+=nal;ex.beznal+=beznal;ex.total+=total;}
    else rows.push({date,nal:Math.round(nal),beznal:Math.round(beznal),total:Math.round(total),checks:1});
  }
  return rows;
}

function showEvPreview(){
  const existing=sales().map(x=>x.date);
  const newRows=_evRows.filter(r=>!existing.includes(r.date));
  const dupRows=_evRows.filter(r=>existing.includes(r.date));

  let tableHtml='<table style="width:100%"><thead><tr><th>Дата</th><th class="r">НАЛ</th><th class="r">БЕЗНАЛ</th><th class="r">Итого</th><th>Статус</th></tr></thead><tbody>';
  _evRows.forEach(r=>{
    const isDup=existing.includes(r.date);
    tableHtml+=`<tr style="${isDup?'opacity:0.4':''}">
      <td>${fd(r.date)}</td>
      <td class="r">${r.nal?fr(r.nal):'—'}</td>
      <td class="r">${r.beznal?fr(r.beznal):'—'}</td>
      <td class="r" style="color:var(--accent);font-weight:600">${fr(r.total)}</td>
      <td><span class="badge ${isDup?'b-warn':'b-ok'}" style="font-size:10px">${isDup?'⚠️ Уже есть':'✅ Новая'}</span></td></tr>`;
  });
  tableHtml+='</tbody></table>';

  const totalNew=newRows.reduce((a,r)=>a+r.total,0);
  document.getElementById('ev-drop').style.display='none';
  document.getElementById('ev-result').style.display='block';
  document.getElementById('ev-preview-table').innerHTML=tableHtml;

function impData(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{try{
    const d=JSON.parse(e.target.result);
    if(d.settings){
      const cur=cfg();
      const merged={...d.settings};
      if(cur.githubToken)merged.githubToken=cur.githubToken;
      if(cur.gistId)merged.gistId=cur.gistId;
      save(K.settings,merged);
    }
    if(d.sales)save(K.sales,d.sales);

// ═══ PLANNING ═══
function calcPlanning(){
  const s=cfg();
  const bal=calcBal();
  const totalCash=bal.c+bal.b;
  const allSales=sales();
  const allExp=exps();
  const allBatch=batches();

  // ── Aggregate totals ──
  const totalRev=allSales.reduce((a,x)=>a+(x.nal||0)+(x.beznal||0),0);
  const totalTaxAccrued=totalRev*s.taxRate;

  // ── Monthly dynamics ──
  const dyn=calcDyn();
  const last3=dyn.slice(-3).filter(m=>m.rev>0);
  const last1=dyn.slice(-1)[0]||{rev:0,opexp:0,cogs:0};
  const avgRev=last3.length?last3.reduce((a,m)=>a+m.rev,0)/last3.length:0;
  const avgOpExp=last3.length?last3.reduce((a,m)=>a+m.opexp,0)/last3.length:0;
  const avgCogs=last3.length?last3.reduce((a,m)=>a+m.cogs,0)/last3.length:0;

  // ── Tax reserve: current quarter unpaid estimate ──
  // Simplified: reserve = current month accrued tax
  const curM=calcMonth();
  const taxReserve=Math.max(0,totalTaxAccrued-(s.taxPaid||0));

  // ── Operating buffer: 1.5 months avg opex ──
  const opBuffer=Math.round(avgOpExp*1.5);

  // ── Purchase budget (user-set or auto) ──
  const purchasePlan=s.purchasePlan||0;

  // ── Safe dividend ──
  const lockedFunds=taxReserve+opBuffer+purchasePlan;
  const safeDividend=Math.max(0,totalCash-lockedFunds);

  // ── Investment recovery ──
  const invested=s.founderInvestment||((s.cashBalance||0)+(s.beznalBalance||0));
  const withdrawn=s.withdrawn||0;
  const businessProfit=totalRev-allExp.filter(x=>x.category!=='Товар/Палеты'&&x.category!=='Доставка').reduce((a,x)=>a+(x.nal||0)+(x.beznal||0),0)-allBatch.reduce((a,x)=>a+(x.cost||0)+(x.delivery||0),0)-totalTaxAccrued;

  // ── Days until cash gap ──
  const dailyBurn=(avgOpExp+avgCogs)/30;
  const daysOfCash=dailyBurn>0?Math.floor(totalCash/dailyBurn):999;

  // ── Purchase safety check ──
  // How much can buy without going below minimum safe balance
  const minSafeBalance=opBuffer+taxReserve;
  const maxPurchaseBudget=Math.max(0,totalCash-minSafeBalance);

  return{
    bal,totalCash,totalRev,totalTaxAccrued,taxReserve,
    opBuffer,purchasePlan,lockedFunds,safeDividend,
    invested,withdrawn,businessProfit,
    avgRev,avgOpExp,avgCogs,
    dailyBurn,daysOfCash,maxPurchaseBudget,
    minSafeBalance,last1
  };
}

  const el=document.getElementById('purchase-check');
  if(!el)return;
  if(purchase>total-minSafe){
    el.style.background='rgba(239,68,68,.08)';el.style.borderColor='rgba(239,68,68,.3)';el.style.color='var(--danger)';
    el.textContent='❌ Риск кассового разрыва — после закупа останется '+Math.round(remaining).toLocaleString('ru-RU')+' ₽, нужно минимум '+Math.round(minSafe).toLocaleString('ru-RU')+' ₽';
  } else if(purchase>maxPurchase*0.8){
    el.style.background='rgba(234,179,8,.08)';el.style.borderColor='rgba(234,179,8,.3)';el.style.color='var(--warning)';
    el.textContent='⚠️ Осторожно — после закупа останется '+Math.round(remaining).toLocaleString('ru-RU')+' ₽, буфер небольшой';
  } else {
    el.style.background='rgba(34,197,94,.08)';el.style.borderColor='rgba(34,197,94,.3)';el.style.color='var(--success)';
    el.textContent='✅ Безопасно — после закупа останется '+Math.round(remaining).toLocaleString('ru-RU')+' ₽ (минимум нужно '+Math.round(minSafe).toLocaleString('ru-RU')+' ₽)';
  }
}

// ═══ GITHUB GIST INTEGRATION ═══

// ── Read-only mode: detect ?gist= in URL ──
const _urlParams=new URLSearchParams(window.location.search);
const _gistId=_urlParams.get('gist');
let _viewMode=!!_gistId;      // true = партнёр открыл ссылку
let _gistData=null;            // данные загруженные из Gist

// Override data accessors in view mode
function salesData(){return _viewMode&&_gistData?(_gistData.sales||[]):sales();}
function expsData(){return _viewMode&&_gistData?(_gistData.expenses||[]):exps();}
function batchesData(){return _viewMode&&_gistData?(_gistData.batches||[]):batches();}
function plansData(){return _viewMode&&_gistData?(_gistData.plans||[]):plans();}
function cfgData(){return _viewMode&&_gistData?(_gistData.settings||cfg()):cfg();}

// ── Fetch Gist data (for view mode) ──
async function fetchGistData(gistId){
  try{
    const r=await fetch('https://api.github.com/gists/'+gistId);
    if(!r.ok)throw new Error('Gist не найден ('+r.status+')');
    const j=await r.json();
    const fileKey=Object.keys(j.files)[0];
    const content=j.files[fileKey].content;
    return JSON.parse(content);
  }catch(e){throw new Error('Ошибка загрузки данных: '+e.message);}
}

// ── Publish to Gist ──
async function publishToGist(){
  const s=cfg();
  const token=s.githubToken||'';
  if(!token){toast('⚠️ Укажи GitHub токен в Настройках','warn',5000);setTimeout(()=>nav('settings'),1500);return;}

  const btn=document.getElementById('gist-pub-btn');
  if(btn){btn.textContent='⏳ Публикую...';btn.disabled=true;}

  try{
    // Strip sensitive fields before publishing to public Gist
    const safeSettings=(()=>{const s={...cfg()};delete s.githubToken;delete s.gistId;return s;})();
    const data={
      settings:safeSettings,sales:sales(),expenses:exps(),
      batches:batches(),plans:plans(),inventory:inventory(),avito:avitoSales(),
      publishedAt:new Date().toISOString()
    };
    const body={
      description:'НАХОДКА — данные магазина',
      public:true,
      files:{'nakhodka_data.json':{content:JSON.stringify(data,null,2)}}
    };

    const existingGistId=s.gistId||'';
    let url='https://api.github.com/gists';
    let method='POST';
    if(existingGistId){url='https://api.github.com/gists/'+existingGistId;method='PATCH';}

    const r=await fetch(url,{
      method,
      headers:{'Authorization':'token '+token,'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(!r.ok){const e=await r.json();throw new Error(e.message||r.status);}
    const j=await r.json();
    const newGistId=j.id;

    // Save gistId for future updates
    save(K.settings,{...cfg(),gistId:newGistId});

    // Build share URL
    const baseUrl=window.location.href.split('?')[0].split('#')[0];
    const shareUrl=baseUrl+'?gist='+newGistId;

    // Show success modal
    showM(`
<div class="m-hdr"><h2>✅ Опубликовано!</h2><button class="m-x" onclick="hideM()">×</button></div>
<div style="margin-bottom:16px;font-size:13px;color:var(--muted);line-height:1.7">
  Данные успешно опубликованы на GitHub Gist.<br>
  Партнёры откроют эту ссылку и увидят актуальные данные в режиме просмотра.
</div>
<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:16px">
  <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">Ссылка для партнёров</div>
  <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);word-break:break-all;line-height:1.6">${shareUrl}</div>
</div>
<div style="font-size:11px;color:var(--muted);margin-bottom:16px">
  💡 Каждый раз когда ты нажимаешь «Опубликовать» — ссылка обновляется автоматически. Партнёры всегда открывают одну и ту же ссылку.
</div>
<div class="m-foot">
  <button class="btn btn-g" onclick="hideM()">Закрыть</button>
  <button class="btn btn-p" onclick="navigator.clipboard.writeText('${shareUrl}').then(()=>{this.textContent='✅ Скопировано!'})">📋 Копировать ссылку</button>
</div>`);
  }catch(e){
    toast('❌ Ошибка: '+e.message,'err',6000);
  }finally{
    if(btn){btn.textContent='📤 Опубликовать';btn.disabled=false;}
  }
}

// ── View mode banner ──

  <div style="display:flex;align-items:center;gap:10px">

    <span class="vb-detail" style="font-size:12px;color:var(--muted)">Обновлено: ${pub}</span>

// Adjust content padding in view mode
function viewModeStyle(){
  return _viewMode?'margin-top:44px':'';
}

// ── Init view mode ──
async function initViewMode(){
  if(!_viewMode)return;
  document.getElementById('content').innerHTML=`
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px">
  <div style="font-size:40px">⏳</div>
  <div style="font-size:16px;font-weight:600;color:var(--text)">Загружаю данные...</div>
  <div style="font-size:12px;color:var(--muted)">Получаю актуальные данные от владельца</div>
</div>`;
  document.body.insertAdjacentHTML('afterbegin',viewModeBanner());
  document.getElementById('content').style.marginTop='44px';
  try{
    _gistData=await fetchGistData(_gistId);
    // ── KEY FIX: write gist data into localStorage so ALL render functions work ──
    if(_gistData.settings)save(K.settings,_gistData.settings);
    if(_gistData.sales)save(K.sales,_gistData.sales);
    if(_gistData.expenses)save(K.expenses,_gistData.expenses);
    if(_gistData.batches)save(K.batches,_gistData.batches);
    if(_gistData.plans)save(K.plans,_gistData.plans);
    if(_gistData.inventory)save(K.inventory,_gistData.inventory);
    if(_gistData.avito)save(K.avito,_gistData.avito);
    // Remove github token from view mode settings for security
    // Never delete githubToken — owner may open own link; only clear gistId to prevent confusion
    const s=cfg();const ownerToken=s.githubToken;delete s.gistId;if(!ownerToken)delete s.githubToken;save(K.settings,s);
    // Lock editing — hide all edit/delete/add buttons
    document.body.classList.add('is-view-mode');
    // Lock editing nav items
    document.querySelectorAll('.nav-item[data-p="sales"],[data-p="expenses"],[data-p="batches"],[data-p="settings"]')
      .forEach(el=>{el.style.opacity='0.35';el.style.pointerEvents='none';});
    render();
  }catch(e){
    document.getElementById('content').innerHTML=`
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;padding:40px">
  <div style="font-size:40px">❌</div>
  <div style="font-size:16px;font-weight:600;color:var(--danger)">${e.message}</div>
  <div style="font-size:12px;color:var(--muted);text-align:center">Проверь ссылку или попроси владельца переопубликовать данные</div>
</div>`;
  }
}

// ═══ MOBILE NAV ═══

// ═══ TOAST SYSTEM ═══
function toast(msg, type='ok', dur=3500){
  let t=document.getElementById('toast-box');
  if(!t){t=document.createElement('div');t.id='toast-box';
    t.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none';
    document.body.appendChild(t);}
  const el=document.createElement('div');
  const bg=type==='ok'?'#22c55e':type==='warn'?'#eab308':type==='err'?'#ef4444':'#3b82f6';
  el.style.cssText=`background:${bg};color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;font-family:Montserrat,sans-serif;box-shadow:0 4px 16px rgba(0,0,0,.4);opacity:0;transition:opacity .2s;max-width:300px;pointer-events:none`;
  el.textContent=msg;t.appendChild(el);
  requestAnimationFrame(()=>{el.style.opacity='1';});
  setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),300);},dur);
}

// ═══ DATA COUNTER SIDEBAR ═══

}

// ═══ AUTO BACKUP ═══
const BACKUP_KEY='nk_last_backup';
function checkAutoBackup(){
  if(_viewMode)return;
  const ss=sales().length,ee=exps().length,bb=batches().length;
  if(ss+ee+bb===0)return; // нечего бэкапить
  const last=localStorage.getItem(BACKUP_KEY);
  const now=new Date();
  const todayStr=now.toISOString().slice(0,10);
  if(last===todayStr)return; // уже делали сегодня
  // Показываем напоминание через 5 сек после загрузки
  setTimeout(()=>{
    const el=document.createElement('div');
    el.id='backup-reminder';
    el.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9998;background:var(--surface);border:1px solid var(--accent);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:14px;box-shadow:0 4px 24px rgba(0,0,0,.5);font-family:Montserrat,sans-serif;max-width:420px;width:90%';
    el.innerHTML=`
      <div style="font-size:24px">💾</div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px">Сделай бэкап данных</div>
        <div style="font-size:11px;color:var(--muted)">${ss} продаж · ${ee} расходов · ${bb} партий</div>
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="expData();localStorage.setItem('${BACKUP_KEY}','${todayStr}');document.getElementById('backup-reminder')?.remove();toast('✅ Бэкап сохранён!')" 
          style="background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:Montserrat,sans-serif;white-space:nowrap">💾 Скачать</button>
        <button onclick="localStorage.setItem('${BACKUP_KEY}','${todayStr}');document.getElementById('backup-reminder')?.remove()"
          style="background:var(--surface2);color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;cursor:pointer;font-family:Montserrat,sans-serif">Позже</button>
      </div>`;
    document.body.appendChild(el);
    // Автоскрытие через 20 сек
    setTimeout(()=>el.remove(),20000);
  },5000);
}

}else{
  render();
  checkAutoBackup();
}
