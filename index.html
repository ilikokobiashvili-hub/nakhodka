// type: 'detail' (has categories) | 'summary' (has nal/beznal)
function evParseText(text){
  // ── Helpers ──
  function extractPriceFromName(name){
    const clean=(name||'').trim();
    const nums=clean.match(/\d+(?:[.,]\d+)?/g)||[];
    const cats=priceCats();
    for(const n of nums){
      const norm=n.replace(',','.');
      const parts=norm.split('.');
      let val;
      if(parts[1]&&parts[1].length===3){val=parseInt(parts[0]+parts[1]);}
      else{val=Math.round(parseFloat(norm));}
      const cat=cats.find(c=>c.price===val);
      if(cat)return val;
    }
    return null;
  }
  function matchCatByPrice(price){
    if(!price)return null;
    return priceCats().find(c=>c.price===price)||null;
  }

  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l.length>2);

  // ── Find header row ──
  let headerIdx=-1,headers=[];
  for(let i=0;i<Math.min(lines.length,15);i++){
    const cols=parseCsvLine(lines[i]).map(c=>c.toLowerCase().trim());
    const hasDate=cols.some(c=>c.includes('дата'));
    const hasAmt=cols.some(c=>c.includes('сумм')||c.includes('итого')||c.includes('налич')||c.includes('безнал')||c.includes('карт')||c.includes('количество'));
    if(hasDate&&hasAmt){headerIdx=i;headers=cols;break;}
  }

  if(headerIdx===-1){
    // Fallback: scan for date lines
    const rows=[];
    for(let i=0;i<lines.length;i++){
      const cols=parseCsvLine(lines[i]);
      const date=parseDate(cols[0]||'');if(!date)continue;
      const nums=cols.slice(1).map(parseNum).filter(n=>n>0);
      if(nums.length===0)continue;
      let nal=0,beznal=0,total=0;
      if(nums.length>=3){nal=nums[0];beznal=nums[1];total=nums[2];}
      else if(nums.length===2){nal=nums[0];beznal=0;total=nums[1];}
      else{total=nums[0];}
      if(total===0)total=nal+beznal;
      rows.push({date,nal:Math.round(nal),beznal:Math.round(beznal),total:Math.round(total),checks:1});
    }
    if(rows.length===0)throw new Error('Не удалось распознать формат CSV. Выгрузи «Отчёт по продажам» или «Сводный отчёт» из Эвотора.');
    return {type:'summary',rows};
  }

  const ci=(keywords)=>headers.findIndex(h=>keywords.some(k=>h.includes(k)));
  const iDate   = ci(['дата']);
  const iNal    = ci(['наличным','нал.','касс','налич']);
  const iBeznal = ci(['безналич','карт','эквайр','платёж','безнал']);
  const iTotal  = ci(['итого за дату','итого','всего']);
  const iPayType= ci(['тип оплат','способ оплат','форма оплат','вид оплат']);
  const iAmt    = ci(['сумма']);
  const iName   = ci(['наименование','товар','название']);
  const iQty    = ci(['количество','кол']);

  const isFormatDetail = iDate>=0 && iName>=0 && iQty>=0 && (iAmt>=0||iTotal>=0);
  const isFormatA = !isFormatDetail && iDate>=0 && iNal>=0 && iBeznal>=0;
  const isFormatB = !isFormatDetail && iDate>=0 && iPayType>=0 && (iAmt>=0||iTotal>=0);

  const rows=[];

  if(isFormatDetail){
    // ── Детальный «Отчёт по продажам» — извлекаем категории ──
    const amtIdx=iAmt>=0?iAmt:(iTotal>=0?iTotal:0);
    let curDate=null;
    const dayMap={};
    for(let i=headerIdx+1;i<lines.length;i++){
      const cols=parseCsvLine(lines[i]);
      const dateCell=(cols[iDate]||'').trim();
      if(dateCell){const d=parseDate(dateCell);if(d)curDate=d;}
      if(!curDate)continue;
      const name=(cols[iName]||'').trim();
      const qty=parseInt(cols[iQty])||0;
      const amt=parseNum(cols[amtIdx]||'0');
      if(qty<=0&&amt<=0)continue;
      if(!dayMap[curDate])dayMap[curDate]={date:curDate,nal:0,beznal:0,total:0,checks:1,priceCats:{}};
      dayMap[curDate].total=Math.round(dayMap[curDate].total+amt);
      const price=extractPriceFromName(name);
      const cat=matchCatByPrice(price);
      if(cat){
        if(!dayMap[curDate].priceCats[cat.key])dayMap[curDate].priceCats[cat.key]={qty:0,rev:0};
        dayMap[curDate].priceCats[cat.key].qty+=qty;
        dayMap[curDate].priceCats[cat.key].rev+=Math.round(amt);
      }
    }
    rows.push(...Object.values(dayMap));
    return {type:'detail',rows};

  } else if(isFormatA){
    // ── Сводный отчёт — нал/безнал по дням ──
    for(let i=headerIdx+1;i<lines.length;i++){
      const cols=parseCsvLine(lines[i]);
      if(!cols[iDate])continue;
      const date=parseDate(cols[iDate]);if(!date)continue;
      const nal=parseNum(cols[iNal]);
      const beznal=parseNum(cols[iBeznal]);
      const total=iTotal>=0?parseNum(cols[iTotal]):nal+beznal;
      if(nal===0&&beznal===0&&total===0)continue;
      const ex=rows.find(r=>r.date===date);
      if(ex){ex.nal+=nal;ex.beznal+=beznal;ex.total+=total||nal+beznal;ex.checks++;}
      else rows.push({date,nal:Math.round(nal),beznal:Math.round(beznal),total:Math.round(total||nal+beznal),checks:1});
    }
    return {type:'summary',rows};

  } else if(isFormatB){
    // ── Транзакционный формат ──
    const amtIdx=iAmt>=0?iAmt:iTotal;
    for(let i=headerIdx+1;i<lines.length;i++){
      const cols=parseCsvLine(lines[i]);
      if(!cols[iDate])continue;
      const date=parseDate(cols[iDate]);if(!date)continue;
      const amt=parseNum(cols[amtIdx]);if(amt===0)continue;
      const pt=(cols[iPayType]||'').toLowerCase();
      const isNal=pt.includes('нал')||pt.includes('касс');
      const isBzn=pt.includes('безнал')||pt.includes('карт')||pt.includes('эквайр');
      const ex=rows.find(r=>r.date===date);
      if(ex){if(isNal)ex.nal+=amt;else if(isBzn)ex.beznal+=amt;else ex.nal+=amt;ex.total+=amt;ex.checks++;}
      else{const r={date,nal:0,beznal:0,total:Math.round(amt),checks:1};if(isNal)r.nal=Math.round(amt);else if(isBzn)r.beznal=Math.round(amt);else r.nal=Math.round(amt);rows.push(r);}
    }
    rows.forEach(r=>{r.nal=Math.round(r.nal);r.beznal=Math.round(r.beznal);r.total=Math.round(r.total);});
    return {type:'summary',rows};
  }

  throw new Error('Не удалось распознать формат CSV. Выгрузи «Отчёт по продажам» или «Сводный отчёт» из Эвотора.');
}

// ── Merge both parsed files and refresh preview ──
function evMergeAndPreview(){
  const p1=window._evParsed1; // detail (categories)
  const p2=window._evParsed2; // summary (nal/beznal)

  // Auto-swap if user loaded files in wrong slots
  let detail=null,summary=null;
  if(p1&&p1.type==='detail')detail=p1;
  if(p1&&p1.type==='summary')summary=p1;
  if(p2&&p2.type==='detail')detail=p2;
  if(p2&&p2.type==='summary')summary=p2;

  // Build merged rows
  const allDates=new Set([
    ...(detail?detail.rows.map(r=>r.date):[]),
    ...(summary?summary.rows.map(r=>r.date):[])
  ]);

  _evRows=[];
  allDates.forEach(date=>{
    const d=detail?detail.rows.find(r=>r.date===date):null;
    const s=summary?summary.rows.find(r=>r.date===date):null;
    const merged={
      date,
      nal:    s?s.nal   :(d?d.nal:0),
      beznal: s?s.beznal:(d?d.beznal:0),
      total:  s?s.total :(d?d.total:0),
      checks: s?s.checks:(d?d.checks:1),
    };
    if(d&&d.priceCats&&Object.keys(d.priceCats).length>0)merged.priceCats=d.priceCats;
    _evRows.push(merged);
  });
  _evRows.sort((a,b)=>b.date.localeCompare(a.date));

  // Show status
  const parts=[];
  if(detail)parts.push(`<span style="color:var(--success)">① категории (${detail.rows.length} дн.)</span>`);
  if(summary)parts.push(`<span style="color:var(--info)">② нал/безнал (${summary.rows.length} дн.)</span>`);
  const statusEl=document.getElementById('ev-status-line');
  if(statusEl)statusEl.innerHTML=`✅ Загружено: ${parts.join(' + ')}`;

  evShowPreview();
}

function evShowError(msg){
  const el=document.getElementById('ev-error');
  const msgEl=document.getElementById('ev-error-msg');
  if(el)el.style.display='block';

function evShowPreview(){
  const existing=sales().map(x=>x.date);
  const newRows=_evRows.filter(r=>!existing.includes(r.date));
  const dupRows=_evRows.filter(r=>existing.includes(r.date));
  const hasCats=_evRows.some(r=>r.priceCats&&Object.keys(r.priceCats).length>0);

  let tableHtml=`<table style="width:100%"><thead><tr><th>Дата</th><th class="r">НАЛ</th><th class="r">БЕЗНАЛ</th><th class="r">Итого</th>${hasCats?'<th>Категории</th>':''}<th>Статус</th></tr></thead><tbody>`;
  _evRows.forEach(r=>{
    const isDup=existing.includes(r.date);
    const catBadges=r.priceCats?tierBadges(r.priceCats)||'<span style="color:var(--muted);font-size:11px">—</span>':'—';
    tableHtml+=`<tr style="${isDup?'opacity:0.4':''}">
      <td>${fd(r.date)}</td>
      <td class="r">${r.nal?fr(r.nal):'—'}</td>
      <td class="r">${r.beznal?fr(r.beznal):'—'}</td>
      <td class="r" style="color:var(--accent);font-weight:600">${fr(r.total)}</td>
      ${hasCats?`<td style="min-width:180px;white-space:normal">${catBadges}</td>`:''}
      <td><span class="badge ${isDup?'b-warn':'b-ok'}" style="font-size:10px">${isDup?'⚠️ Уже есть':'✅ Новая'}</span></td></tr>`;
  });
  tableHtml+='</tbody></table>';

  const totalNew=newRows.reduce((a,r)=>a+r.total,0);
  document.getElementById('ev-result').style.display='block';
  document.getElementById('ev-preview-table').innerHTML=tableHtml;
  document.getElementById('ev-stats').innerHTML=
    `Найдено дней: <b>${_evRows.length}</b> · Новых: <b style="color:var(--success)">${newRows.length}</b> · Уже есть: <b style="color:var(--warning)">${dupRows.length}</b> · Сумма новых: <b style="color:var(--accent)">${fr(totalNew)}</b>`;
  const btn=document.getElementById('ev-save-btn');
  if(btn){btn.style.display='flex';if(newRows.length===0)btn.textContent='Все дни уже импортированы';}
}

function svEvotorCSV(){
  const existing=sales();
  const existingDates=existing.map(x=>x.date);
  const newRows=_evRows.filter(r=>!existingDates.includes(r.date));
  newRows.forEach(r=>{
    const total=r.nal+r.beznal||1;
    const nalChecks=r.nal>0&&r.beznal===0?r.checks||0:r.nal>0?Math.round((r.nal/total)*(r.checks||0)):0;
    const beznalChecks=r.beznal>0&&r.nal===0?r.checks||0:r.beznal>0?Math.round((r.beznal/total)*(r.checks||0)):0;
    const entry={id:gid(),date:r.date,nal:r.nal,beznal:r.beznal,
      nalChecks,beznalChecks,note:'Эвотор CSV',source:'evotor'};
    if(r.priceCats&&Object.keys(r.priceCats).length>0)entry.priceCats=r.priceCats;
    existing.push(entry);
  });
  save(K.sales,existing);
  hideM();
  toast(`✅ Импортировано ${newRows.length} дней из Эвотора`);
  render();
}

// ═══ SIMPLE SYNC — auto uses saved GitHub token ═══
async function generateSyncCode(){
  const s=cfg();const token=s.githubToken||'';
  const btn=document.getElementById('gen-sync-btn');
  if(btn){btn.textContent='⏳ Создаю код...';btn.disabled=true;}
  try{
    const d={settings:(()=>{const c={...cfg()};delete c.githubToken;delete c.gistId;delete c.syncGistId;return c;})(),
      sales:sales(),expenses:exps(),batches:batches(),plans:plans(),
      inventory:inventory(),avito:avitoSales(),transfers:transfers(),
      syncDate:new Date().toISOString()};
    const body={description:'НАХОДКА sync',public:true,
      files:{'nakhodka_sync.json':{content:JSON.stringify(d)}}};
    
    let url='https://api.github.com/gists';
    let method='POST';
    const existingId=s.syncGistId||'';
    if(existingId&&token){url='https://api.github.com/gists/'+existingId;method='PATCH';}
    
    let gistId=existingId;
    if(token){
      // Use GitHub if token available
      const r=await fetch(url,{method,headers:{'Authorization':'token '+token,'Content-Type':'application/json'},body:JSON.stringify(body)});
      if(!r.ok){const e=await r.json();throw new Error(e.message||r.status);}
      const j=await r.json();
      gistId=j.id;
      save(K.settings,{...cfg(),syncGistId:gistId});
    } else {
      // Fallback: use npoint.io
      const r=await fetch('https://api.npoint.io/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});
      if(!r.ok)throw new Error('Нужен GitHub токен — добавь выше и повтори');
      const j=await r.json();gistId=j.id;
    }
    
    showM('<div class="m-hdr"><h2>✅ Код создан!</h2><button class="m-x" onclick="hideM()">×</button></div>'
     +'<div style="font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:16px">Введи этот код на iPhone в разделе Настройки → «🔑 Ввести код»</div>'
     +'<div style="background:var(--surface2);border:2px solid var(--accent);border-radius:12px;padding:20px;text-align:center;margin-bottom:16px">'
     +'<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Код синхронизации</div>'
     +'<div style="font-family:\'JetBrains Mono\',monospace;font-size:14px;color:var(--accent);letter-spacing:1px;word-break:break-all;line-height:1.6" id="sync-code-show">'+gistId+'</div>'
     +'</div>'
     +'<div style="font-size:11px;color:var(--muted);margin-bottom:16px">📱 На iPhone: Настройки → «🔑 Ввести код» → вставь → «Загрузить»</div>'
     +'<div class="m-foot"><button class="btn btn-g" onclick="hideM()">Закрыть</button>'
     +'<button class="btn btn-p" onclick="navigator.clipboard.writeText(document.getElementById(\'sync-code-show\').textContent).then(()=>{this.textContent=\'✅ Скопировано!\'})">📋 Скопировать</button></div>');
  }catch(e){
    toast('❌ '+e.message,'err',5000);
  }finally{
    if(btn){btn.textContent='📱 Создать код для iPhone';btn.disabled=false;}
  }
}

async function doRestoreFromCode(){
  const raw=document.getElementById('sync-code-inp').value.trim();
  if(!raw){toast('Вставь код!','err');return;}
  const btn=document.getElementById('restore-btn');
  if(btn){btn.textContent='⏳ Загружаю...';btn.disabled=true;}
  try{
    // Try GitHub Gist first (public, no auth needed to read)
    let d=null;
    const ts=Date.now();
    const r=await fetch('https://api.github.com/gists/'+raw+'?_='+ts,{headers:{'Cache-Control':'no-cache'}});
    if(r.ok){
      const j=await r.json();
      const content=j.files['nakhodka_sync.json']?.content;
      if(content)d=JSON.parse(content);
    }
    if(!d){
      // Try npoint.io fallback
      const r2=await fetch('https://api.npoint.io/'+raw);
      if(r2.ok){const j2=await r2.json();if(j2.sales||j2.batches)d=j2;}
    }
    if(!d)throw new Error('Код не найден — создай новый на компьютере');
    const cur=cfg();
    if(d.settings)save(K.settings,{...d.settings,githubToken:cur.githubToken||''});
    if(d.sales)save(K.sales,d.sales);
    if(d.expenses)save(K.expenses,d.expenses);
    if(d.batches)save(K.batches,d.batches);
    if(d.plans)save(K.plans,d.plans);
    if(d.inventory)save(K.inventory,d.inventory);
    if(d.avito)save(K.avito,d.avito);
    if(d.transfers)save(K.transfers,d.transfers);
    hideM();toast('✅ Данные загружены! '+( d.sales?.length||0)+' продаж восстановлено.');render();
  }catch(e){
    toast('❌ '+e.message,'err',5000);
    if(btn){btn.textContent='⬇️ Загрузить данные';btn.disabled=false;}
  }
}

function impData(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{try{
    const d=JSON.parse(e.target.result);
    if(d.settings){
      const cur=cfg();
      const merged={...d.settings};
      if(cur.githubToken)merged.githubToken=cur.githubToken;
      if(cur.gistId)merged.gistId=cur.gistId;
      save(K.settings,merged);
    }
    if(d.sales)save(K.sales,d.sales);
    if(d.expenses)save(K.expenses,d.expenses);
    if(d.batches)save(K.batches,d.batches);
    if(d.plans)save(K.plans,d.plans);
    if(d.inventory)save(K.inventory,d.inventory);
    if(d.avito)save(K.avito,d.avito);
    if(d.transfers)save(K.transfers,d.transfers);
    toast('✅ Данные импортированы');render();
  }catch(err){toast('❌ Ошибка импорта: '+err.message,'err',5000)}};
  r.readAsText(file);input.value='';
}

// ═══ PLANNING ═══
function calcPlanning(){
  const s=cfg();
  const bal=calcBal();
  const totalCash=bal.c+bal.b;
  const allSales=sales();
  const allExp=exps();
  const allBatch=batches();

  // ── Aggregate totals ──
  const totalRev=allSales.reduce((a,x)=>a+(x.nal||0)+(x.beznal||0),0);
  const totalTaxAccrued=totalRev*s.taxRate;

  // ── Monthly dynamics ──
  const dyn=calcDyn();
  const last3=dyn.slice(-3).filter(m=>m.rev>0);
  const last1=dyn.slice(-1)[0]||{rev:0,opexp:0,cogs:0};
  const avgRev=last3.length?last3.reduce((a,m)=>a+m.rev,0)/last3.length:0;
  const avgOpExp=last3.length?last3.reduce((a,m)=>a+m.opexp,0)/last3.length:0;
  const avgCogs=last3.length?last3.reduce((a,m)=>a+m.cogs,0)/last3.length:0;

  // ── Tax reserve: current quarter unpaid estimate ──
  // Simplified: reserve = current month accrued tax
  const curM=calcMonth();
  const taxReserve=Math.max(0,totalTaxAccrued-(s.taxPaid||0));

  // ── Operating buffer: 1.5 months avg opex ──
  const opBuffer=Math.round(avgOpExp*1.5);

  // ── Purchase budget (user-set or auto) ──
  const purchasePlan=s.purchasePlan||0;

  // ── Safe dividend ──
  const lockedFunds=taxReserve+opBuffer+purchasePlan;
  const safeDividend=Math.max(0,totalCash-lockedFunds);

  // ── Investment recovery ──
  const invested=s.founderInvestment||((s.cashBalance||0)+(s.beznalBalance||0));
  const withdrawn=s.withdrawn||0;
  const businessProfit=totalRev-allExp.filter(x=>x.category!=='Товар/Палеты'&&x.category!=='Доставка').reduce((a,x)=>a+(x.nal||0)+(x.beznal||0),0)-allBatch.reduce((a,x)=>a+(x.cost||0)+(x.delivery||0),0)-totalTaxAccrued;

  // ── Gross margin from SOLD items (same logic as rAnalysis) ──
  const allSalesAll=sales(),allAv=avitoSales(),allBB=batches();
  const acqRate=s.acquiringRate!=null?s.acquiringRate:0.0195;
  const _totalRev=allSalesAll.reduce((a,x)=>a+(x.nal||0)+(x.beznal||0),0);
  const _totalBzn=allSalesAll.reduce((a,x)=>a+(x.beznal||0),0);
  const _totalRevReal=_totalRev-_totalBzn*acqRate;
  // Unit COGS by category
  function bK(b){const t=(b.cost||0)+(b.delivery||0);const ci=b.cogsItems||[];const p=ci.reduce((a,c)=>a+(c.qty||0)*(c.price||0),0);return p?t/p:0;}
  const uCogs={};
  allBB.forEach(b=>{const k=bK(b);(b.cogsItems||[]).forEach(ci=>{if(!uCogs[ci.key])uCogs[ci.key]={p1:null,p2:null};if(b.batchNum==='П1')uCogs[ci.key].p1=ci.unitCogs||Math.round(ci.price*k);else uCogs[ci.key].p2=ci.unitCogs||Math.round(ci.price*k);});});
  const p1U={};
  allBB.filter(b=>b.batchNum==='П1').forEach(b=>(b.cogsItems||[]).forEach(c=>{p1U[c.key]=c.qty||0;}));
  const sBC={};
  allSalesAll.forEach(x=>{const pc=x.priceCats||{};Object.entries(pc).forEach(([k,v])=>{sBC[k]=(sBC[k]||0)+(v.qty||0);});});
  let _soldCogs=0;
  Object.entries(sBC).forEach(([k,qty])=>{const uc=uCogs[k]||{};const p1a=p1U[k]||0;const f1=Math.min(qty,p1a);const f2=Math.max(0,qty-p1a);_soldCogs+=f1*(uc.p1||0)+f2*(uc.p2||0);});
  const grossMarginReal=_totalRevReal>0?Math.max(0,(_totalRevReal-_soldCogs)/_totalRevReal):0;

  // ── Fixed costs (постоянные расходы) ──
  const fixedM=(s.fixedCosts||[]).reduce((a,x)=>a+(x.amount||0),0);

  // ── Days until cash gap ──
  const dailyBurn=(avgOpExp+avgCogs)/30;
  const daysOfCash=dailyBurn>0?Math.floor(totalCash/dailyBurn):999;

  // ── Purchase safety check ──
  // How much can buy without going below minimum safe balance
  const minSafeBalance=opBuffer+taxReserve;
  const maxPurchaseBudget=Math.max(0,totalCash-minSafeBalance);

  return{
    bal,totalCash,totalRev:_totalRev,totalTaxAccrued,taxReserve,
    opBuffer,purchasePlan,lockedFunds,safeDividend,
    invested,withdrawn,businessProfit,
    avgRev,avgOpExp,avgCogs,fixedM,grossMarginReal,
    dailyBurn,daysOfCash,maxPurchaseBudget,
    minSafeBalance,last1
  };
}

function updatePurchaseCheck(){
  const meta=document.getElementById('plan-meta');
  if(!meta)return;
  const minSafe=+meta.dataset.minsafe||0;
  const total=+meta.dataset.total||0;
  const maxPurchase=+meta.dataset.maxpurchase||0;
  const purchase=+document.getElementById('pp-purchase').value||0;
  const remaining=total-purchase;
  const el=document.getElementById('purchase-check');
  if(!el)return;
  if(purchase>total-minSafe){
    el.style.background='rgba(239,68,68,.08)';el.style.borderColor='rgba(239,68,68,.3)';el.style.color='var(--danger)';
    el.textContent='❌ Риск кассового разрыва — после закупа останется '+Math.round(remaining).toLocaleString('ru-RU')+' ₽, нужно минимум '+Math.round(minSafe).toLocaleString('ru-RU')+' ₽';
  } else if(purchase>maxPurchase*0.8){
    el.style.background='rgba(234,179,8,.08)';el.style.borderColor='rgba(234,179,8,.3)';el.style.color='var(--warning)';
    el.textContent='⚠️ Осторожно — после закупа останется '+Math.round(remaining).toLocaleString('ru-RU')+' ₽, буфер небольшой';
  } else {
    el.style.background='rgba(34,197,94,.08)';el.style.borderColor='rgba(34,197,94,.3)';el.style.color='var(--success)';
    el.textContent='✅ Безопасно — после закупа останется '+Math.round(remaining).toLocaleString('ru-RU')+' ₽ (минимум нужно '+Math.round(minSafe).toLocaleString('ru-RU')+' ₽)';
  }
}

// ── Read-only mode: detect ?gist= in URL ──
const _urlParams=new URLSearchParams(window.location.search);
const _gistId=_urlParams.get('gist');
let _viewMode=!!_gistId;      // true = партнёр открыл ссылку
let _gistData=null;            // данные загруженные из Gist

// Override data accessors in view mode
function salesData(){return _viewMode&&_gistData?(_gistData.sales||[]):sales();}
function expsData(){
  if(_viewMode&&_gistData){
    if(_gistData.expenses&&_gistData.expenses.length)return _gistData.expenses;
    if(_gistData.expenseAggregate){
      const rows=[];
      Object.entries(_gistData.expenseAggregate).forEach(([date,v])=>{
        if((v.nal||0)+(v.beznal||0)>0)rows.push({id:'agg_op_'+date,date,nal:v.nal||0,beznal:v.beznal||0,category:'Прочее',fundSource:'business'});
        if((v.cogs_nal||0)+(v.cogs_beznal||0)>0)rows.push({id:'agg_cogs_'+date,date,nal:v.cogs_nal||0,beznal:v.cogs_beznal||0,category:'Товар/Палеты',fundSource:'business'});
      });
      return rows;
    }
    return[];
  }
  return exps();
}
function batchesData(){return _viewMode&&_gistData?(_gistData.batches||[]):batches();}
function plansData(){return _viewMode&&_gistData?(_gistData.plans||[]):plans();}
function cfgData(){return _viewMode&&_gistData?(_gistData.settings||cfg()):cfg();}

// ── Fetch Gist data (for view mode) ──
async function fetchGistData(gistId){
  try{
    // Add timestamp to bypass browser cache (no extra headers — avoids CORS preflight)
    const ts=Date.now();
    const r=await fetch('https://api.github.com/gists/'+gistId+'?_='+ts);
    if(!r.ok)throw new Error('Gist не найден ('+r.status+')');
    const j=await r.json();
    const fileKey=Object.keys(j.files)[0];
    const file=j.files[fileKey];
    // If file is truncated, fetch raw content
    let content=file.content;
    if(file.truncated&&file.raw_url){
      const r2=await fetch(file.raw_url+'?_='+ts);
      if(r2.ok)content=await r2.text();
    }
    return JSON.parse(content);
  }catch(e){throw new Error('Ошибка загрузки данных: '+e.message);}
}

    const j=await r.json();
    const newGistId=j.id;

    // Save gistId for future updates
    save(K.settings,{...cfg(),gistId:newGistId});

    // Build share URL
    const baseUrl=window.location.href.split('?')[0].split('#')[0];
    const shareUrl=baseUrl+'?gist='+newGistId;

    // Show success modal
    showM(`
<div class="m-hdr"><h2>✅ Опубликовано!</h2><button class="m-x" onclick="hideM()">×</button></div>
<div style="margin-bottom:16px;font-size:13px;color:var(--muted);line-height:1.7">
  Данные успешно опубликованы на GitHub Gist.<br>
  Партнёры откроют эту ссылку и увидят актуальные данные в режиме просмотра.
</div>
<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:16px">
  <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">Ссылка для партнёров</div>
  <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);word-break:break-all;line-height:1.6">${shareUrl}</div>
</div>
<div style="font-size:11px;color:var(--muted);margin-bottom:16px">
  💡 Каждый раз когда ты нажимаешь «Опубликовать» — ссылка обновляется автоматически. Партнёры всегда открывают одну и ту же ссылку.
</div>
<div class="m-foot">
  <button class="btn btn-g" onclick="hideM()">Закрыть</button>
  <button class="btn btn-p" onclick="navigator.clipboard.writeText('${shareUrl}').then(()=>{this.textContent='✅ Скопировано!'})">📋 Копировать ссылку</button>
</div>`);
  }catch(e){
    toast('❌ Ошибка: '+e.message,'err',6000);
  }finally{
    if(btn){btn.textContent='📤 Опубликовать';btn.disabled=false;}
  }
}

  <div style="display:flex;align-items:center;gap:10px">

    <span class="vb-detail" style="font-size:12px;color:var(--muted)">Обновлено: ${pub}</span>
    <button onclick="location.reload()" style="background:rgba(168,85,247,.15);border:1px solid #a855f7;border-radius:6px;padding:3px 10px;font-size:11px;font-weight:600;color:#a855f7;cursor:pointer;font-family:Montserrat,sans-serif">🔄 Обновить</button>

// Adjust content padding in view mode
function viewModeStyle(){
  return _viewMode?'margin-top:44px':'';
}

// ── Init view mode ──
async function initViewMode(){
  if(!_viewMode)return;
  // ── Warn owner if they accidentally open view link in their own admin browser ──
  const hasAdminData=sales().length>0||exps().length>0||batches().length>0;
  const hasToken=!!(cfg().githubToken);
  if(hasAdminData||hasToken){
    document.getElementById('content').innerHTML=`
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;padding:24px">
  <div style="font-size:40px">⚠️</div>
  <div style="font-size:16px;font-weight:700;color:var(--text)">Это ссылка для партнёров</div>
  <div style="font-size:13px;color:var(--muted);text-align:center;max-width:400px;line-height:1.7">
    Ты открыл view-ссылку в своём браузере где есть admin-данные.<br>
    <b style="color:var(--warning)">Нажимать «Продолжить» не рекомендуется</b> — это только для просмотра.<br>
    Для работы с данными используй чистую ссылку без <code style="background:var(--surface2);padding:2px 6px;border-radius:4px">?gist=</code>
  </div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
    <button onclick="window.location.href=window.location.href.split('?')[0]"
      style="background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:Montserrat,sans-serif">
      🏠 Открыть мою версию
    </button>
    <button onclick="proceedViewMode()"
      style="background:var(--surface2);color:var(--muted);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:13px;cursor:pointer;font-family:Montserrat,sans-serif">
      👁 Всё равно просмотреть
    </button>
  </div>
</div>`;
    return;
  }
  await proceedViewMode();

async function proceedViewMode(){
  document.getElementById('content').innerHTML=`
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px">
  <div style="font-size:40px">⏳</div>
  <div style="font-size:16px;font-weight:600;color:var(--text)">Загружаю данные...</div>
  <div style="font-size:12px;color:var(--muted)">Получаю актуальные данные от владельца</div>
</div>`;
  if(!document.getElementById('view-banner'))document.body.insertAdjacentHTML('afterbegin',viewModeBanner());
  document.getElementById('content').style.marginTop='44px';
  try{
    _gistData=await fetchGistData(_gistId);
    // ── IMPORTANT: do NOT write gist data into localStorage ──
    // All data accessor functions (salesData, batchesData, etc.) already read
    // from _gistData when _viewMode is true. Writing to localStorage would
    // CORRUPT the admin's own data if they open the view link in their own browser.
    // Lock editing — hide all edit/delete/add buttons
    document.body.classList.add('is-view-mode');
    // Lock editing nav items
    document.querySelectorAll('.nav-item[data-p="sales"],[data-p="batches"],[data-p="settings"]')
      .forEach(el=>{el.style.opacity='0.35';el.style.pointerEvents='none';});
    // Hide expenses tab completely in view mode
    document.querySelectorAll('.nav-item[data-p="expenses"]')
      .forEach(el=>{el.style.display='none';});
    render();
  }catch(e){
    document.getElementById('content').innerHTML=`
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;padding:40px">
  <div style="font-size:40px">❌</div>
  <div style="font-size:16px;font-weight:600;color:var(--danger)">${e.message}</div>
  <div style="font-size:12px;color:var(--muted);text-align:center">Проверь ссылку или попроси владельца переопубликовать данные</div>
</div>`;
  }
}

// ═══ MOBILE NAV ═══
function mobNav(el,p){
  document.querySelectorAll('.mob-tab').forEach(t=>t.classList.remove('active'));
  if(el)el.classList.add('active');
  if(p==='more'){showMoreMenu();return;}
  nav(p);
}

function syncMobTabs(p){
  document.querySelectorAll('.mob-tab').forEach(t=>{
    t.classList.toggle('active',t.dataset.p===p);
  });
}

function showMoreMenu(){
  const pages=[
    ...(!_viewMode?[{p:'expenses',icon:'💸',label:'Расходы'}]:[]),
    {p:'batches',icon:'📦',label:'Партии'},
    {p:'cashflow',icon:'💵',label:'Кэш-флоу'},
    {p:'dynamics',icon:'📅',label:'Динамика'},
    {p:'planfact',icon:'🎯',label:'План vs Факт'},
    {p:'analysis',icon:'🧠',label:'Финанализ'},
    {p:'settings',icon:'⚙️',label:'Настройки'},
  ];
  showM(`
<div class="m-hdr"><h2>☰ Все разделы</h2><button class="m-x" onclick="hideM()">×</button></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:4px 0 8px">
  ${pages.map(x=>`
  <button onclick="hideM();nav('${x.p}');syncMobTabs('${x.p}')"
    style="display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text);font-family:'Montserrat',sans-serif;text-align:left">

// ═══ TOAST SYSTEM ═══
function toast(msg, type='ok', dur=3500){
  let t=document.getElementById('toast-box');
  if(!t){t=document.createElement('div');t.id='toast-box';
    t.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none';
    document.body.appendChild(t);}
  const el=document.createElement('div');
  const bg=type==='ok'?'#22c55e':type==='warn'?'#eab308':type==='err'?'#ef4444':'#3b82f6';
  el.style.cssText=`background:${bg};color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;font-family:Montserrat,sans-serif;box-shadow:0 4px 16px rgba(0,0,0,.4);opacity:0;transition:opacity .2s;max-width:300px;pointer-events:none`;
  el.textContent=msg;t.appendChild(el);
  requestAnimationFrame(()=>{el.style.opacity='1';});
  setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),300);},dur);
}

// ═══ DATA COUNTER SIDEBAR ═══
function updateSbStats(){
  const el=document.getElementById('sb-stats');if(!el)return;
  const ss=salesData().length,ee=expsData().length,bb=batchesData().length,aa=(_viewMode&&_gistData?(_gistData.avito||[]):avitoSales()).length;

  const lastDate=lastSale?'последняя: '+fd(lastSale.date):'нет данных';
  el.innerHTML=`

    ${aa>0?`<div>🛒 Авито: <b style="color:var(--info)">${aa}</b></div>`:''}
    ${!_viewMode?`<div>💸 Расходы: <b style="color:var(--accent)">${ee}</b></div>`:''}
    <div>📦 Партии: <b style="color:var(--accent)">${bb}</b></div>
    <div style="margin-top:4px;color:var(--muted);font-size:10px">${lastDate}</div>`;
}

// ═══ AUTO BACKUP ═══
const BACKUP_KEY='nk_last_backup';
function checkAutoBackup(){
  if(_viewMode)return;
  const ss=sales().length,ee=exps().length,bb=batches().length;
  if(ss+ee+bb===0)return; // нечего бэкапить
  const last=localStorage.getItem(BACKUP_KEY);
  const now=new Date();
  const todayStr=now.toISOString().slice(0,10);
  if(last===todayStr)return; // уже делали сегодня
  // Показываем напоминание через 5 сек после загрузки
  setTimeout(()=>{
    const el=document.createElement('div');
    el.id='backup-reminder';
    el.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9998;background:var(--surface);border:1px solid var(--accent);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:14px;box-shadow:0 4px 24px rgba(0,0,0,.5);font-family:Montserrat,sans-serif;max-width:420px;width:90%';
    el.innerHTML=`
      <div style="font-size:24px">💾</div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px">Сделай бэкап данных</div>
        <div style="font-size:11px;color:var(--muted)">${ss} продаж · ${ee} расходов · ${bb} партий</div>
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="expData();localStorage.setItem('${BACKUP_KEY}','${todayStr}');document.getElementById('backup-reminder')?.remove();toast('✅ Бэкап сохранён!')" 
          style="background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:Montserrat,sans-serif;white-space:nowrap">💾 Скачать</button>
        <button onclick="localStorage.setItem('${BACKUP_KEY}','${todayStr}');document.getElementById('backup-reminder')?.remove()"
          style="background:var(--surface2);color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;cursor:pointer;font-family:Montserrat,sans-serif">Позже</button>
      </div>`;
    document.body.appendChild(el);
    // Автоскрытие через 20 сек
    setTimeout(()=>el.remove(),20000);
  },5000);
}

// Sidebar stats updated via render() directly

if(!load(K.settings))save(K.settings,{...DEF});
// ── Migration: fill missing fundSource → 'business' ──
(function migrateFundSource(){
  const ee=exps();
  const missing=ee.filter(x=>!x.fundSource);
  if(missing.length>0){
    missing.forEach(x=>{x.fundSource='business';});
    save(K.expenses,ee);
  }
})();
// ── New device detection ──
function checkNewDevice(){
  if(_viewMode)return;
  const hasSales=sales().length>0;
  const hasExpenses=exps().length>0;
  const hasBatches=batches().length>0;
  const hasToken=cfg().githubToken;
  if(!hasSales&&!hasExpenses&&!hasBatches){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.id='new-device-banner';
      el.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9998;background:var(--surface);border:1px solid var(--accent);border-radius:14px;padding:16px 20px;max-width:420px;width:calc(100vw - 40px);box-shadow:0 8px 32px rgba(0,0,0,.5)';
      el.innerHTML=`
        <div style="display:flex;align-items:flex-start;gap:12px">
          <div style="font-size:28px">📱</div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px">Новое устройство?</div>
            <div style="font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:10px">Данных не найдено. Если у тебя есть Код синхронизации или JSON-бэкап — загрузи данные.</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <button onclick="document.getElementById('new-device-banner').remove();showRestoreDialog()"
                style="background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:Montserrat,sans-serif">☁️ Восстановить из облака</button>
              <button onclick="document.getElementById('new-device-banner').remove();document.getElementById('imp-f2')?.click()||nav('settings')"
                style="background:var(--surface2);color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:12px;cursor:pointer;font-family:Montserrat,sans-serif">📂 Импорт JSON</button>
              <button onclick="document.getElementById('new-device-banner').remove()"
                style="background:none;color:var(--muted);border:none;padding:7px 8px;font-size:12px;cursor:pointer;font-family:Montserrat,sans-serif">✕</button>
            </div>
          </div>
        </div>`;
      document.body.appendChild(el);
    },2000);
  }
}
if(_viewMode){
  initViewMode();
}else{
  render();
  checkAutoBackup();
  checkNewDevice();
}
</script>
